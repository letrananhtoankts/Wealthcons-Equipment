function BidBudgetPage({ user, mode }) {
  const { projects, bids, budgets, categories, overwriteBidBudget } = useData();
  const toast = useToast();
  const [selectedPid, setSelectedPid] = useState('');
  const [lines, setLines] = useState({});
  const [saving, setSaving] = useState(false);
  const [viewMode, setViewMode] = useState('list'); // list | form
  const isB = mode === 'bid';
  const source = isB ? bids : budgets;
  const SHEET = isB ? 'BID_COST' : 'BUDGET';
  const amtField = isB ? 'bid_amount' : 'budget_amount';
  const totField = isB ? 'total_bid' : 'total_budget';
  const title = isB ? 'Chi Phí Đấu Thầu' : 'Dự Trù Chi Phí';

  // Khi chọn dự án để nhập/sửa → load dữ liệu hiện có vào form
  const openForm = (pid) => {
    setSelectedPid(pid);
    const existing = {};
    source.filter(b=>b.project_id===pid).forEach(b => {
      existing[b.category_code] = { amount: b[amtField] ? parseInt(b[amtField]).toLocaleString('vi-VN') : '', notes: b.notes||'' };
    });
    const init = {};
    categories.forEach(c => {
      init[c.code] = existing[c.code] || { amount:'', notes:'' };
    });
    setLines(init);
    setViewMode('form');
  };

  const setLine = (code, k, v) => setLines(l => ({...l, [code]: {...l[code],[k]:v}}));
  const formatAmt = v => { const n=v.replace(/\D/g,''); return n?parseInt(n).toLocaleString('vi-VN'):''; };

  const handleSave = async () => {
    setSaving(true);
    try {
      const rows = categories.map(c => {
        const l = lines[c.code]||{};
        const amt = parseFloat((l.amount||'').replace(/\./g,''))||0;
        return [selectedPid, c.code, c.name, String(amt), 1, 'Hệ', String(amt), user.name, todayStr(), l.notes||''];
      }).filter(r => parseFloat(r[3]) > 0);
      await overwriteBidBudget(SHEET, selectedPid, rows, isB);
      toast(`Đã lưu ${title} cho ${selectedPid}!`, 'success');
      setViewMode('list');
    } catch(e) { toast('Lỗi: '+e.message, 'error'); } finally { setSaving(false); }
  };

  const total = Object.values(lines).reduce((s,l) => s+(parseFloat((l.amount||'').replace(/\./g,''))||0), 0);

  // Tổng hợp theo dự án cho danh sách
  const summaryByProject = projects.map(p => {
    const rows = source.filter(b=>b.project_id===p.project_id);
    const total = rows.reduce((s,b)=>s+(parseFloat(b[totField])||0), 0);
    return { ...p, total, rowCount: rows.length };
  }).filter(p => p.rowCount > 0);

  return (
    <div>
      <div className="section-header mb-20">
        <div><div className="section-title">{title}</div>
          <div className="section-sub">{summaryByProject.length} công trình đã nhập</div>
        </div>
        {viewMode==='form'
          ? <button className="btn btn-secondary" onClick={()=>setViewMode('list')}>← Quay lại danh sách</button>
          : user.role !== 'viewer' && <button className="btn btn-primary" onClick={()=>{ setSelectedPid(''); setViewMode('form'); setLines({}); }}>+ Nhập mới</button>
        }
      </div>

      {/* DANH SÁCH */}
      {viewMode === 'list' && (
        <>
          {summaryByProject.length === 0 ? (
            <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">Chưa có dữ liệu {title.toLowerCase()}. Nhấn "+ Nhập mới" để bắt đầu.</div></div>
          ) : (
            <div className="card mb-16">
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Công trình</th><th>Địa điểm</th><th>Số hạng mục</th><th className="text-right">Tổng {isB?'đấu thầu':'dự trù'}</th><th></th></tr></thead>
                  <tbody>
                    {summaryByProject.map(p => (
                      <tr key={p.project_id}>
                        <td><div style={{fontWeight:500}}>{p.project_name}</div><div className="text-sm text-muted">{p.project_id}</div></td>
                        <td className="text-muted">{p.location}</td>
                        <td className="mono text-sm">{p.rowCount} hạng mục</td>
                        <td className="mono text-right font-bold text-amber">{fmtB(p.total)}</td>
                        <td>
                          {user.role !== 'viewer' &&
                            <button className="btn btn-secondary btn-sm" onClick={()=>openForm(p.project_id)}>✏️ Xem / Sửa</button>
                          }
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Chi tiết theo hạng mục */}
          {summaryByProject.length > 0 && (
            <div className="card">
              <div className="card-header"><span className="card-title">Chi tiết tất cả hạng mục</span></div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Công trình</th><th>Hạng mục</th><th className="text-right">Số tiền</th><th>Ngày cập nhật</th><th>Người cập nhật</th></tr></thead>
                  <tbody>
                    {source.map((b,i) => (
                      <tr key={i}>
                        <td className="text-sm">{projects.find(p=>p.project_id===b.project_id)?.short_name||b.project_id}</td>
                        <td>{b.category_name || categories.find(c=>c.code===b.category_code)?.name || b.category_code}</td>
                        <td className="mono text-right font-bold text-amber">{fmtM(parseFloat(b[totField]))}</td>
                        <td className="text-sm text-muted">{b.updated_at}</td>
                        <td className="text-sm text-muted">{b.updated_by}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}

      {/* FORM NHẬP / SỬA */}
      {viewMode === 'form' && (
        <>
          <div className="card mb-16">
            <div className="card-body" style={{padding:'16px 20px'}}>
              <div className="form-group" style={{margin:0,maxWidth:400}}>
                <label className="form-label">Chọn công trình</label>
                <select className="form-select" value={selectedPid} onChange={e=>openForm(e.target.value)}>
                  <option value="">— Chọn công trình —</option>
                  {projects.map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
                </select>
              </div>
            </div>
          </div>

          {selectedPid && (
            <div className="card">
              <div className="card-header">
                <span className="card-title">{isB?'Đơn giá đấu thầu':'Dự trù chi phí'} — {selectedPid}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--amber)',fontWeight:700}}>Tổng: {fmtB(total)}</span>
              </div>
              <div className="card-body">
                <div style={{display:'grid',gridTemplateColumns:'2fr 2fr 2fr',gap:8,marginBottom:8,padding:'0 4px'}}>
                  <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Hạng mục</span>
                  <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Số tiền (VNĐ, chưa VAT)</span>
                  <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Ghi chú</span>
                </div>
                {categories.map(c => {
                  const l = lines[c.code]||{amount:'',notes:''};
                  return (
                    <div key={c.code} style={{display:'grid',gridTemplateColumns:'2fr 2fr 2fr',gap:8,marginBottom:8,alignItems:'center'}}>
                      <div style={{fontWeight:500,fontSize:13,padding:'9px 0'}}>{c.name}</div>
                      <input className="form-input" value={l.amount} onChange={e=>setLine(c.code,'amount',formatAmt(e.target.value))} placeholder="0" style={{textAlign:'right',fontFamily:'var(--mono)'}} />
                      <input className="form-input" value={l.notes||''} onChange={e=>setLine(c.code,'notes',e.target.value)} placeholder="Ghi chú..." />
                    </div>
                  );
                })}
                <div className="divider" />
                <div className="alert warning" style={{marginBottom:12}}>
                  <span>⚠</span><span>Lưu sẽ <strong>ghi đè</strong> toàn bộ dữ liệu {title.toLowerCase()} của công trình này. Dữ liệu cũ sẽ bị xóa.</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:13,color:'var(--text3)'}}>Tổng: <span style={{fontFamily:'var(--mono)',color:'var(--amber)',fontWeight:700}}>{fmtB(total)}</span></span>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-secondary" onClick={()=>setViewMode('list')}>Hủy</button>
                    <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Đang lưu...':'💾 Lưu vào Sheets'}</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// NGƯỜI DÙNG (Admin only)
// ============================================================
function UsersPage({ user }) {
  const { users, appendUser, deleteUser } = useData();
  const toast = useToast();
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ email:'', role:'editor', full_name:'', status:'Active' });
  const [saving, setSaving] = useState(false);
  const [deleting, setDeleting] = useState(null);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSave = async () => {
    if (!form.email) { toast('Nhập email', 'error'); return; }
    setSaving(true);
    try {
      await appendUser([form.email.toLowerCase().trim(), form.role, form.full_name, form.status]);
      toast('Đã thêm người dùng!', 'success');
      setShowForm(false);
      setForm({ email:'', role:'editor', full_name:'', status:'Active' });
    } catch(e) { toast('Lỗi: '+e.message, 'error'); } finally { setSaving(false); }
  };

  const handleDelete = async (u) => {
    if (u.email === user.email) { toast('Không thể xóa tài khoản đang đăng nhập!', 'error'); return; }
    if (!window.confirm(`Xóa người dùng "${u.full_name || u.email}"?\nHành động này không thể hoàn tác.`)) return;
    setDeleting(u.email);
    try {
      await deleteUser(u.email);
      toast('Đã xóa người dùng!', 'success');
    } catch(e) { toast('Lỗi: '+e.message, 'error'); } finally { setDeleting(null); }
  };

  return (
    <div>
      <div className="section-header mb-20">
        <div><div className="section-title">Quản Lý Người Dùng</div><div className="section-sub">{users.length} tài khoản</div></div>
        <button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ Thêm Người Dùng</button>
      </div>
      <div className="alert info mb-16">
        <span>ℹ</span>
        <span>App đã publish — mọi email trong danh sách này đều đăng nhập được mà không cần thêm vào Google Console.</span>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Email</th><th>Họ tên</th><th>Role</th><th>Trạng thái</th><th></th></tr></thead>
            <tbody>
              {users.map(u => (
                <tr key={u.email}>
                  <td className="mono text-sm">{u.email}</td>
                  <td>{u.full_name}</td>
                  <td><span className={`badge ${u.role==='admin'?'over':u.role==='editor'?'warn':'active'}`}>{u.role}</span></td>
                  <td><span className={`badge ${isActive(u.status)?'active':'closed'}`}>{u.status}</span></td>
                  <td>
                    <button className="btn btn-danger btn-sm" onClick={()=>handleDelete(u)} disabled={deleting===u.email||u.email===user.email}>
                      {deleting===u.email?'...':'🗑️'}
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {showForm && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="modal" style={{width:480}}>
            <div className="modal-header"><span className="modal-title">Thêm Người Dùng</span><button className="modal-close" onClick={()=>setShowForm(false)}>×</button></div>
            <div className="modal-body">
              <div className="form-grid" style={{gap:14}}>
                <div className="form-group"><label className="form-label required">Email Google</label><input className="form-input" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="user@gmail.com" /></div>
                <div className="form-group"><label className="form-label">Họ tên</label><input className="form-input" value={form.full_name} onChange={e=>set('full_name',e.target.value)} /></div>
                <div className="form-group"><label className="form-label">Role</label>
                  <select className="form-select" value={form.role} onChange={e=>set('role',e.target.value)}>
                    <option value="viewer">Viewer — Chỉ xem Dashboard</option>
                    <option value="editor">Editor — Nhập dữ liệu + xem</option>
                    <option value="admin">Admin — Toàn quyền</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowForm(false)}>Hủy</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Đang lưu...':'💾 Lưu'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Mobile pages (chỉ xem)
function MobileActualList() {
  const { actuals, projects, suppliers, categories } = useData();
  const [filterPid, setFilterPid] = useState('all');
  const [filterMonth, setFilterMonth] = useState('');
  const sortedProjects = sortProjects(projects);

  const filtered = actuals.filter(a => {
    if (filterPid !== 'all' && a.project_id !== filterPid) return false;
    if (filterMonth && !a.month.includes(filterMonth)) return false;
    return true;
  }).sort((a,b)=>{
    const pa=parseMonth(a.month),pb=parseMonth(b.month);
    if(!pa||!pb) return 0;
    return (pb.year*12+pb.month)-(pa.year*12+pa.month);
  }).slice(0,50);

  const getProjectName = id => projects.find(p=>p.project_id===id)?.short_name||id;
  const getSupplierName = id => suppliers.find(s=>s.supplier_id===id)?.short_code||id;
  const getCatName = code => categories.find(c=>c.code===code)?.name||code;

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <select className="form-select" style={{flex:2}} value={filterPid} onChange={e=>setFilterPid(e.target.value)}>
          <option value="all">Tất cả công trình</option>
          {sortedProjects.filter(p=>isActive(p.status)).map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
          {sortedProjects.filter(p=>p.status!=='Active'&&p.status!=='Đang hoạt động').map(p=><option key={p.project_id} value={p.project_id}>{p.project_name} (KT)</option>)}
        </select>
        <input className="form-input" style={{flex:1,maxWidth:100}} value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} placeholder="MM/YYYY"/>
      </div>
      <div style={{fontSize:12,color:'var(--text3)',marginBottom:10}}>{filtered.length} kết quả (tối đa 50)</div>
      {filtered.map(a=>(
        <div key={a.cost_id} className="mobile-cost-card">
          <div className="mobile-cost-header">
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{getProjectName(a.project_id)}</div>
              <div className="mobile-cost-meta">{getSupplierName(a.supplier_id)} · {a.month}</div>
            </div>
            <div className="mobile-cost-amount">{fmtB(parseFloat(a.amount))}</div>
          </div>
          <div className="mobile-cost-tags">
            <span className="badge active">{getCatName(a.category_code)}</span>
            {a.bill_ref && <span className="badge closed">{a.bill_ref}</span>}
            {a.bill_pdf_url && <a href={a.bill_pdf_url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'var(--amber)'}}>📄 PDF</a>}
          </div>
        </div>
      ))}
    </div>
  );
}

      case 'budget':    return <BidBudgetPage user={user} mode="budget" />;
      case 'projects':  return <ProjectsPage user={user} />;

      case 'users':     return <UsersPage user={user} />;

            <div className="logo-title">Chi Phí Thiết Bị</div>
          </div>
          <nav className="sidebar-nav">
            <div className="nav-section">
              <div className="nav-label">Menu</div>
              {visibleNav.map(n=>(
                <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
                  <span className="icon">{n.icon}</span>
                  <span>{n.label}</span>

            <div className="user-info">
              <div className="user-avatar">{user.initials}</div>

                <div className="user-name">{user.name}</div>
                <div className="user-role">{user.role}</div>

        {/* MAIN */}

          <div className="topbar">
            <div className="topbar-title">{currentNav.icon} {currentNav.label}</div>
            <div className="topbar-meta">{new Date().toLocaleDateString('vi-VN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
          </div>
          <div className="content">
            {/* Desktop: full page */}
            <div className="desktop-only">{renderPage()}</div>
            {/* Mobile: simplified view-only */}
            <div className="mobile-only">{renderMobilePage()}</div>
          </div>
        </main>

        {/* MOBILE BOTTOM TAB BAR */}
        <nav className="mobile-tabbar">
          {MOBILE_TABS.map(t=>(
            <button key={t.id} className={`mobile-tab ${page===t.id?'active':''}`} onClick={()=>setPage(t.id)}>
              <span className="mobile-tab-icon">{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </nav>

      </div>
    </DataProvider>
  );
}

// ============================================================
// ROOT
// ============================================================
function App() {
  const { user, token, loading, login, logout } = useAuth();

  if (loading) return (
    <div className="loading-page">
      <div className="spinner"></div>
      <span style={{color:'var(--text3)',fontSize:13}}>Đang khởi động...</span>
    </div>
  );

  if (!user) return <LoginPage onLogin={login} />;
  return <AppShell user={user} token={token} logout={logout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
</html>
