<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealthcons — Theo Dõi Chi Phí Thuê Thiết Bị</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1b2d;
    --navy2: #162236;
    --navy3: #1e3050;
    --amber: #f59e0b;
    --amber2: #fbbf24;
    --amber-dim: rgba(245,158,11,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-dim: rgba(234,179,8,0.15);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.04);
    --card: rgba(22,34,54,0.95);
    --radius: 10px;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--navy); color: var(--text); min-height: 100vh; font-size: 14px; }
  #root { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: 220px; min-height: 100vh; background: var(--navy2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
  .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
  .logo-mark { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--amber); text-transform: uppercase; }
  .logo-title { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 2px; line-height: 1.3; }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-section { padding: 0 12px; margin-bottom: 4px; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; padding: 8px 6px 4px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all 0.15s; margin-bottom: 1px; }
  .nav-item:hover { background: var(--border); color: var(--text); }
  .nav-item.active { background: var(--amber-dim); color: var(--amber); font-weight: 500; }
  .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
  .sidebar-user { padding: 14px 16px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--amber-dim); border: 1.5px solid var(--amber); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--amber); flex-shrink: 0; }
  .user-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .logout-btn { font-size: 11px; color: var(--text3); cursor: pointer; margin-top: 8px; padding: 4px 0; transition: color 0.15s; }
  .logout-btn:hover { color: var(--red); }

  /* MAIN */
  .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { height: 56px; background: var(--navy2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 50; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .content { padding: 24px 28px; flex: 1; }

  /* LOGIN */
  .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--navy); }
  .login-card { background: var(--navy2); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 380px; text-align: center; }
  .login-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; color: var(--amber); text-transform: uppercase; margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text3); margin-bottom: 36px; line-height: 1.5; }
  .login-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 13px 20px; background: var(--amber); color: #0f1b2d; font-family: var(--font); font-size: 14px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .login-btn:hover { background: var(--amber2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(245,158,11,0.3); }
  .login-footer { margin-top: 24px; font-size: 11px; color: var(--text3); }

  /* CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-body { padding: 20px; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-card.actual::before { background: var(--amber); }
  .kpi-card.budget::before { background: #60a5fa; }
  .kpi-card.bid::before { background: #a78bfa; }
  .kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--text); font-family: var(--mono); line-height: 1; }
  .kpi-unit { font-size: 13px; font-weight: 400; color: var(--text3); margin-left: 4px; }
  .kpi-diff { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 12px; font-weight: 500; font-family: var(--mono); padding: 2px 8px; border-radius: 20px; }
  .kpi-diff.over { background: var(--red-dim); color: var(--red); }
  .kpi-diff.ok { background: var(--green-dim); color: var(--green); }
  .kpi-diff.warn { background: var(--yellow-dim); color: var(--yellow); }

  /* CHART GRID */
  .chart-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; margin-bottom: 20px; }
  .chart-container { position: relative; width: 100%; }

  /* FILTERS */
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-right: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--text2); transition: all 0.15s; background: transparent; font-family: var(--font); }
  .pill:hover { border-color: var(--amber); color: var(--amber); }
  .pill.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .select-input { background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 5px 10px; font-size: 12px; font-family: var(--font); cursor: pointer; outline: none; }
  .select-input:focus { border-color: var(--amber); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border2); transition: background 0.12s; cursor: default; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.total-row { background: rgba(245,158,11,0.05); border-top: 1px solid var(--border); }
  tbody td { padding: 10px 14px; font-size: 13px; color: var(--text); }
  td.mono { font-family: var(--mono); font-size: 12px; }
  td.muted { color: var(--text3); }

  /* STATUS BADGE */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: var(--green-dim); color: var(--green); }
  .badge.warn { background: var(--yellow-dim); color: var(--yellow); }
  .badge.over { background: var(--red-dim); color: var(--red); }
  .badge.active { background: rgba(96,165,250,0.12); color: #60a5fa; }
  .badge.closed { background: var(--border); color: var(--text3); }

  /* FORMS */
  .form-grid { display: grid; gap: 16px; }
  .form-grid.cols2 { grid-template-columns: 1fr 1fr; }
  .form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
  .form-label.required::after { content: ' *'; color: var(--amber); }
  .form-input { background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.15s; width: 100%; }
  .form-input:focus { border-color: var(--amber); }
  .form-input::placeholder { color: var(--text3); }
  .form-input.error { border-color: var(--red); }
  .form-select { background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.15s; width: 100%; cursor: pointer; }
  .form-select:focus { border-color: var(--amber); }
  .form-hint { font-size: 11px; color: var(--text3); }
  .form-error { font-size: 11px; color: var(--red); }
  textarea.form-input { resize: vertical; min-height: 80px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: var(--font); transition: all 0.15s; }
  .btn-primary { background: var(--amber); color: #0f1b2d; }
  .btn-primary:hover { background: var(--amber2); }
  .btn-secondary { background: var(--navy3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* MULTI-LINE ITEMS */
  .line-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .line-item { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 8px; align-items: center; background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; }
  .add-line-btn { display: flex; align-items: center; gap: 6px; color: var(--amber); font-size: 12px; cursor: pointer; padding: 6px 0; background: none; border: none; font-family: var(--font); }
  .add-line-btn:hover { opacity: 0.8; }
  .remove-line { color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color 0.12s; background: none; border: none; }
  .remove-line:hover { color: var(--red); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
  .modal { background: var(--navy2); border: 1px solid var(--border); border-radius: 14px; width: 640px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .modal-close { color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; background: none; border: none; color: var(--text3); transition: color 0.12s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; overflow-y: auto; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  /* ALERTS */
  .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .alert.info { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2); color: #93c5fd; }
  .alert.success { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
  .alert.error { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
  .alert.warning { background: var(--yellow-dim); border: 1px solid rgba(234,179,8,0.2); color: #fde047; }

  /* SPINNER */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 12px; }
  .loading-page .spinner { width: 32px; height: 32px; border-width: 3px; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .section-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* PROGRESS BAR */
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .progress-label { font-size: 11px; font-family: var(--mono); color: var(--text3); width: 42px; text-align: right; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* NOTIFICATION TOAST */
  .toast-container { position: fixed; top: 70px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--navy2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.2s ease; min-width: 280px; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--amber); }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* MISC */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .text-mono { font-family: var(--mono); }
  .text-amber { color: var(--amber); }
  .text-red { color: var(--red); }
  .text-green { color: var(--green); }
  .text-muted { color: var(--text3); }
  .text-sm { font-size: 12px; }
  .font-bold { font-weight: 700; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .mt-auto { margin-top: auto; }
  .w-full { width: 100%; }
  .text-right { text-align: right; }

  /* CHART LEGEND */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .kpi-grid { grid-template-columns: 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
    .form-grid.cols2, .form-grid.cols3 { grid-template-columns: 1fr; }
    .line-item { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<div id="root"></div>

<script type="text/babel">
// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
  CLIENT_ID: '951533091636-5nkj0kn623qvhf0npl20inlu03hsiepr.apps.googleusercontent.com',
  API_KEY: 'AIzaSyDjmb3AlT_MhvZY-Gyh-hP8dW28O-fVnLw',
  SPREADSHEET_ID: '1WzAX5czxrCAye2S5CdTqSElKz3isXLhul9okEelGm1M',
  SCOPES: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file',
  ADMIN_EMAILS: ['letrananhtoan.kts@gmail.com'],
};

const CATEGORIES = [
  { code: 'BAOCHE',      name: 'Bao che' },
  { code: 'CHONGSAN',    name: 'Chống sàn' },
  { code: 'CONGTACTAM',  name: 'Công tác tấm' },
  { code: 'VANCHUYEN',   name: 'Vận chuyển' },
  { code: 'HAOHUT',      name: 'Hao hụt' },
  { code: 'VANTHANGTAI', name: 'Vận thăng tải' },
  { code: 'CAUTHAP',     name: 'Cầu thang' },
];

const SHEETS = {
  USERS: 'USERS!A:D',
  PROJECTS: 'PROJECTS!A:J',
  SUPPLIERS: 'SUPPLIERS!A:L',
  ACTUAL: 'ACTUAL_COST!A:N',
  BID: 'BID_COST!A:J',
  BUDGET: 'BUDGET!A:J',
  DASHBOARD: 'DASHBOARD_DATA!A:Z',
};

// ============================================================
// HELPERS
// ============================================================
const fmt = (n) => {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('vi-VN');
};
const fmtB = (n) => {
  if (!n && n !== 0) return '—';
  const b = n / 1e9;
  return b.toFixed(2) + ' tỷ';
};
const fmtPct = (a, b) => {
  if (!b || b === 0) return null;
  return Math.round((a / b) * 100);
};
const statusBadge = (pct) => {
  if (pct === null) return null;
  if (pct < 80) return 'ok';
  if (pct <= 100) return 'warn';
  return 'over';
};
const statusLabel = (pct) => {
  if (pct === null) return '—';
  if (pct < 80) return 'Tốt';
  if (pct <= 100) return 'Chú ý';
  return 'Vượt DT';
};
const nowMonth = () => {
  const d = new Date();
  return String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
};
const parseMonth = (s) => {
  if (!s) return null;
  const [m, y] = s.split('/');
  return { month: parseInt(m), year: parseInt(y) };
};
const monthYear = (s) => {
  const p = parseMonth(s);
  if (!p) return s;
  return `T${p.month}/${p.year}`;
};
const todayStr = () => {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
};
const genId = (prefix) => `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,6).toUpperCase()}`;

// Sheets API
const sheetsGet = async (token, range) => {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}?key=${CONFIG.API_KEY}`;
  const headers = token ? { Authorization: `Bearer ${token}` } : {};
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`Sheets GET error: ${res.status}`);
  const data = await res.json();
  return data.values || [];
};

const sheetsAppend = async (token, range, values) => {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values }),
  });
  if (!res.ok) throw new Error(`Sheets APPEND error: ${res.status}`);
  return await res.json();
};

const sheetsUpdate = async (token, range, values) => {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values }),
  });
  if (!res.ok) throw new Error(`Sheets UPDATE error: ${res.status}`);
  return await res.json();
};

// Parse rows (skip header row 1)
const parseRows = (rows, fields) => {
  if (!rows || rows.length < 2) return [];
  return rows.slice(1).map(row => {
    const obj = {};
    fields.forEach((f, i) => { obj[f] = row[i] || ''; });
    return obj;
  });
};

const { useState, useEffect, useRef, useCallback } = React;

const ToastContext = React.createContext(null);
const useToast = () => React.useContext(ToastContext);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastContext.Provider value={add}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>
            <span>{t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'}</span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useAuth() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [loading, setLoading] = useState(true);
  const tokenClientRef = useRef(null);

  useEffect(() => {
    // Try restore session
    const saved = localStorage.getItem('wc_user');
    if (saved) {
      try { setUser(JSON.parse(saved)); } catch(e) {}
    }
    // Preload GIS script immediately on page load (before user clicks anything)
    if (!window.google?.accounts) {
      const script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.async = true;
      script.defer = true;
      script.onload = () => setLoading(false);
      script.onerror = () => setLoading(false);
      document.head.appendChild(script);
    } else {
      setLoading(false);
    }
    // Restore token if not expired
    const savedToken = localStorage.getItem('wc_token');
    const savedExp = parseInt(localStorage.getItem('wc_token_exp') || '0');
    if (savedToken && savedExp > Date.now() + 60000) {
      setToken(savedToken);
    }
  }, []);

  const login = (role, name, email, picture) => {
    const u = { role, name, email, picture, initials: name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) };
    setUser(u);
    localStorage.setItem('wc_user', JSON.stringify(u));
  };

  const logout = () => {
    setUser(null);
    setToken(null);
    localStorage.removeItem('wc_user');
    localStorage.removeItem('wc_token');
    localStorage.removeItem('wc_token_exp');
    if (window.google) google.accounts.oauth2.revoke(token || '');
  };

  const requestToken = () => {
    if (tokenClientRef.current) tokenClientRef.current.requestAccessToken();
  };

  return { user, token, loading, login, logout, requestToken, setToken };
}

function LoginPage({ onLogin }) {
  const [step, setStep] = useState('idle');
  const [error, setError] = useState('');
  const toast = useToast();

  const verifyAndLogin = async (email, name, picture, accessToken) => {
    setStep('verify');
    // Save token
    localStorage.setItem('wc_token', accessToken);
    localStorage.setItem('wc_token_exp', String(Date.now() + 3500*1000));
    try {
      // Dùng accessToken để đọc USERS — không cần Sheets public
      const rows = await sheetsGet(accessToken, SHEETS.USERS);
      const users = parseRows(rows, ['email','role','full_name','status']);
      const found = users.find(u => u.email?.toLowerCase() === email.toLowerCase());
      if (found && found.status === 'Active') {
        onLogin(found.role, found.full_name || name, email, picture);
        toast('Đăng nhập thành công!', 'success');
      } else if (CONFIG.ADMIN_EMAILS.includes(email.toLowerCase())) {
        onLogin('admin', name, email, picture);
        toast('Đăng nhập Admin thành công!', 'success');
      } else {
        setStep('error');
        setError('Email chưa được cấp quyền. Liên hệ Admin để được thêm vào hệ thống.');
      }
    } catch(e) {
      if (CONFIG.ADMIN_EMAILS.includes(email.toLowerCase())) {
        onLogin('admin', name, email, picture);
        toast('Đăng nhập thành công (admin fallback)!', 'success');
      } else {
        setStep('error');
        setError('Lỗi đọc danh sách người dùng: ' + e.message);
      }
    }
  };

  // This must be called directly from a user click — no async before window.open
  const handleLogin = () => {
    setError('');
    setStep('loading');

    const run = () => {
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            setStep('error');
            setError('Google từ chối: ' + (resp.error_description || resp.error));
            return;
          }
          // Get user info
          try {
            const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: 'Bearer ' + resp.access_token }
            });
            const info = await r.json();
            await verifyAndLogin(
              (info.email||'').toLowerCase(),
              info.name || info.email,
              info.picture || '',
              resp.access_token
            );
          } catch(e) {
            setStep('error');
            setError('Lỗi lấy thông tin tài khoản: ' + e.message);
          }
        },
        error_callback: (err) => {
          setStep('idle');
          setError(err.type === 'popup_closed' ? '' : 'Lỗi: ' + (err.message || err.type));
        },
      });
      // requestAccessToken phải gọi SYNCHRONOUSLY trong click handler
      tc.requestAccessToken({ prompt: 'select_account' });
    };

    if (window.google?.accounts?.oauth2) {
      run();
    } else {
      // Script chưa load — load xong thì báo user click lại (không thể auto-open popup async)
      setStep('idle');
      setError('Thư viện Google chưa sẵn sàng. Vui lòng thử lại sau 2 giây.');
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => setError('');
      document.head.appendChild(s);
    }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">WEALTHCONS</div>
        <div className="login-title">Theo Dõi Chi Phí Thuê Thiết Bị</div>
        <div className="login-sub">Hệ thống quản lý chi phí thuê thiết bị xây dựng<br/>tích hợp Google Sheets · 6 dự án · 7 hạng mục</div>
        {error && <div className="alert error" style={{marginBottom:16,textAlign:'left'}}><span>✕</span><span>{error}</span></div>}
        {step === 'loading' || step === 'verify' ? (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'13px 20px',background:'rgba(245,158,11,0.1)',borderRadius:8,color:'var(--amber)'}}>
            <div className="spinner"></div>
            <span>{step==='verify'?'Đang xác thực quyền truy cập...':'Đang kết nối Google...'}</span>
          </div>
        ) : (
          <button className="login-btn" onClick={handleLogin}>
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Đăng nhập bằng Google
          </button>
        )}
        <div className="login-footer" style={{marginTop:16}}>Chỉ dành cho nhân viên Wealthcons Construction<br/>Phiên bản 1.0 · {new Date().getFullYear()}</div>
      </div>
    </div>
  );
}

function BarChart({ data, labels, datasets }) {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11, family: "'IBM Plex Sans'" }, boxWidth: 12, boxHeight: 12 } }, tooltip: { callbacks: { label: ctx => ' ' + fmtB(ctx.raw) } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 }, callback: v => fmtB(v) } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{width:'100%',height:'220px'}} />;
}

      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{width:'100%',height:'220px'}} />;
}

function Dashboard({ user }) {
  const { projects, actuals, bids, budgets } = useData();
  const [yearFilter, setYearFilter] = useState('all');
  const [projectFilter, setProjectFilter] = useState('all');
  const [donutMode, setDonutMode] = useState('cat'); // cat | ncc

  const years = [...new Set(actuals.map(a => parseMonth(a.month)?.year).filter(Boolean))].sort();

  const filtered = actuals.filter(a => {
    const p = parseMonth(a.month);
    if (yearFilter !== 'all' && p?.year !== parseInt(yearFilter)) return false;
    if (projectFilter !== 'all' && a.project_id !== projectFilter) return false;
    return true;
  });

  const totalActual = filtered.reduce((s, a) => s + (parseFloat(a.amount)||0), 0);
  
  const activePids = projectFilter === 'all'
    ? projects.filter(p => p.status === 'Active').map(p => p.project_id)
    : [projectFilter];

  const totalBid = bids.filter(b => activePids.includes(b.project_id)).reduce((s,b) => s+(parseFloat(b.total_bid)||0), 0);
  const totalBudget = budgets.filter(b => activePids.includes(b.project_id)).reduce((s,b) => s+(parseFloat(b.total_budget)||0), 0);

  const pct = fmtPct(totalActual, totalBudget);

  // Bar chart by project
  const activeProjects = projects.filter(p => p.status === 'Active');
  const barLabels = activeProjects.map(p => p.short_name || p.project_id);
  const barActual = activeProjects.map(p => filtered.filter(a => a.project_id === p.project_id).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  const barBudget = activeProjects.map(p => budgets.filter(b => b.project_id === p.project_id).reduce((s,b)=>s+(parseFloat(b.total_budget)||0),0));
  const barBid = activeProjects.map(p => bids.filter(b => b.project_id === p.project_id).reduce((s,b)=>s+(parseFloat(b.total_bid)||0),0));

  // Donut
  const COLORS = ['#f59e0b','#60a5fa','#a78bfa','#34d399','#f87171','#fb923c','#818cf8'];
  let donutLabels, donutData;
  if (donutMode === 'cat') {
    donutLabels = CATEGORIES.map(c => c.name);
    donutData = CATEGORIES.map(c => filtered.filter(a => a.category_code === c.code).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  } else {
    const sids = [...new Set(filtered.map(a => a.supplier_id))];
    donutLabels = sids.map(sid => suppliers?.find(s=>s.supplier_id===sid)?.short_code || sid);
    donutData = sids.map(sid => filtered.filter(a=>a.supplier_id===sid).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  }
  const { suppliers } = useData();

  // Timeline
  const allMonths = [...new Set(actuals.map(a=>a.month))].sort((a,b) => {
    const pa=parseMonth(a), pb=parseMonth(b);
    return (pa.year*12+pa.month)-(pb.year*12+pb.month);
  });
  const displayMonths = allMonths.filter(m => {
    const p = parseMonth(m);
    if (yearFilter !== 'all' && p?.year !== parseInt(yearFilter)) return false;
    return true;
  });
  const timelineActual = displayMonths.map(m => filtered.filter(a=>a.month===m).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  let cumulative = 0;
  const timelineCumul = timelineActual.map(v => { cumulative += v; return cumulative; });

  // Detail table
  const tableRows = activeProjects.map(p => {
    const pActual = filtered.filter(a => a.project_id === p.project_id).reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
    const pBudget = budgets.filter(b => b.project_id === p.project_id).reduce((s,b)=>s+(parseFloat(b.total_budget)||0),0);
    const pBid = bids.filter(b => b.project_id === p.project_id).reduce((s,b)=>s+(parseFloat(b.total_bid)||0),0);
    const pctVal = fmtPct(pActual, pBudget);
    return { ...p, pActual, pBudget, pBid, pct: pctVal };
  });

  return (
    <div>
      <div className="section-header mb-20">
        <div>
          <div className="section-title">Dashboard Tổng Quan</div>
          <div className="section-sub">Chi phí thuê thiết bị — tất cả dự án</div>
        </div>
        {CONFIG.SPREADSHEET_ID === 'ĐIỀN_SPREADSHEET_ID_VÀO_ĐÂY' && (
          <div className="badge warn">⚠ Đang dùng dữ liệu mẫu (demo)</div>
        )}
      </div>

      {/* Filters */}
      <div className="filter-bar">
        <span className="filter-label">Năm</span>
        <button className={`pill ${yearFilter==='all'?'active':''}`} onClick={()=>setYearFilter('all')}>Tất cả</button>
        {years.map(y => <button key={y} className={`pill ${yearFilter===String(y)?'active':''}`} onClick={()=>setYearFilter(String(y))}>{y}</button>)}
        <div className="filter-sep" />
        <span className="filter-label">Công trình</span>
        <button className={`pill ${projectFilter==='all'?'active':''}`} onClick={()=>setProjectFilter('all')}>Tất cả</button>
        {projects.filter(p=>p.status==='Active').map(p => (
          <button key={p.project_id} className={`pill ${projectFilter===p.project_id?'active':''}`} onClick={()=>setProjectFilter(p.project_id)}>{p.short_name||p.project_id}</button>
        ))}
      </div>

      {/* KPI */}
      <div className="kpi-grid">
        <div className="kpi-card actual">
          <div className="kpi-label">Chi Phí Thực Tế</div>
          <div className="kpi-value">{fmtB(totalActual).replace(' tỷ','')}<span className="kpi-unit">tỷ VNĐ</span></div>
          {pct !== null && <div className={`kpi-diff ${statusBadge(pct)}`}>{pct}% so với dự trù</div>}
        </div>
        <div className="kpi-card budget">
          <div className="kpi-label">Dự Trù Chi Phí</div>
          <div className="kpi-value">{fmtB(totalBudget).replace(' tỷ','')}<span className="kpi-unit">tỷ VNĐ</span></div>
          <div style={{marginTop:8,fontSize:12,color:'var(--text3)'}}>Ngân sách nội bộ</div>
        </div>
        <div className="kpi-card bid">
          <div className="kpi-label">Giá Trị Đấu Thầu</div>
          <div className="kpi-value">{fmtB(totalBid).replace(' tỷ','')}<span className="kpi-unit">tỷ VNĐ</span></div>
          <div style={{marginTop:8,fontSize:12,color:'var(--text3)'}}>Giá hợp đồng ban đầu</div>
        </div>
      </div>

      {/* Charts row 1 */}
      <div className="chart-grid">
        <div className="card">
          <div className="card-header">
            <span className="card-title">Thực tế vs Dự trù vs Đấu thầu</span>
            <div className="legend">
              <span className="legend-item"><span className="legend-dot" style={{background:'#f59e0b'}}></span>Thực tế</span>
              <span className="legend-item"><span className="legend-dot" style={{background:'#60a5fa'}}></span>Dự trù</span>
              <span className="legend-item"><span className="legend-dot" style={{background:'#a78bfa'}}></span>Đấu thầu</span>
            </div>
          </div>
          <div className="card-body" style={{height:240}}>
            <BarChart labels={barLabels} datasets={[
              { label: 'Thực tế', data: barActual, backgroundColor: 'rgba(245,158,11,0.8)', borderRadius: 4 },
              { label: 'Dự trù', data: barBudget, backgroundColor: 'rgba(96,165,250,0.6)', borderRadius: 4 },
              { label: 'Đấu thầu', data: barBid, backgroundColor: 'rgba(167,139,250,0.5)', borderRadius: 4 },
            ]} />
          </div>
        </div>
        <div className="card">
          <div className="card-header">
            <span className="card-title">Cơ Cấu Chi Phí</span>
            <div style={{display:'flex',gap:6}}>
              <button className={`pill pill-sm ${donutMode==='cat'?'active':''}`} onClick={()=>setDonutMode('cat')}>Hạng mục</button>
              <button className={`pill pill-sm ${donutMode==='ncc'?'active':''}`} onClick={()=>setDonutMode('ncc')}>NCC</button>
            </div>
          </div>
          <div className="card-body" style={{height:240}}>
            <DonutChart labels={donutLabels} data={donutData} colors={COLORS} />
          </div>
        </div>
      </div>

      {/* Timeline */}
      <div className="card mb-20">
        <div className="card-header">
          <span className="card-title">Chi Phí Thực Tế Theo Tháng</span>
        </div>
        <div className="card-body" style={{height:240}}>
          <LineChart labels={displayMonths.map(monthYear)} datasets={[
            { label: 'Thực tế tháng', data: timelineActual, backgroundColor: 'rgba(245,158,11,0.7)', borderRadius: 3, type: 'bar', order: 2 },
            { label: 'Lũy kế', data: timelineCumul, borderColor: '#60a5fa', backgroundColor: 'transparent', type: 'line', yAxisID: 'y1', tension: 0.3, pointRadius: 2, order: 1 },
          ]} />
        </div>
      </div>

      {/* Table */}
      <div className="card">
        <div className="card-header"><span className="card-title">Bảng Chi Tiết Theo Công Trình</span></div>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Công trình</th>
              <th>Địa điểm</th>
              <th className="text-right">Thực tế</th>
              <th className="text-right">Dự trù</th>

              <th className="text-right">% Dự trù</th>
              <th>Tiến độ</th>
              <th>Trạng thái</th>
            </tr></thead>
            <tbody>
              {tableRows.map(r => (
                <tr key={r.project_id}>

function ActualCostForm({ user, token, onClose }) {
  const { projects, suppliers, appendActual } = useData();
  const toast = useToast();
  const [form, setForm] = useState({ project_id:'', supplier_id:'', month: nowMonth(), bill_ref:'', bill_pdf_url:'' });
  const [lines, setLines] = useState([{ category_code:'', amount:'', notes:'' }]);
  const [saving, setSaving] = useState(false);
  const [errors, setErrors] = useState({});

  const set = (k, v) => setForm(f => ({...f, [k]:v}));
  const setLine = (i, k, v) => setLines(ls => ls.map((l,j) => j===i ? {...l,[k]:v} : l));
  const addLine = () => setLines(ls => [...ls, { category_code:'', amount:'', notes:'' }]);
  const removeLine = (i) => setLines(ls => ls.filter((_,j) => j!==i));

  const validate = () => {
    const e = {};
    if (!form.project_id) e.project_id = 'Chọn công trình';
    if (!form.supplier_id) e.supplier_id = 'Chọn NCC';
    if (!form.month) e.month = 'Nhập tháng';
    if (!form.bill_ref) e.bill_ref = 'Nhập số chứng từ';
    lines.forEach((l,i) => {
      if (!l.category_code) e[`cat_${i}`] = 'Chọn hạng mục';
      if (!l.amount || isNaN(l.amount.replace(/\./g,''))) e[`amt_${i}`] = 'Nhập số tiền';
    });
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = async () => {
    if (!validate()) return;
    setSaving(true);
    try {
      const rows = lines.map((l, i) => [
        genId('C'),
        form.project_id,
        form.supplier_id,
        l.category_code,
        l.category_code,
        form.month,
        l.amount.replace(/\./g,''),
        form.bill_ref,
        form.bill_pdf_url,
        todayStr(),
        user.name,
        'FALSE',
        '',
        l.notes,
      ]);
      await appendActual(rows);
      toast(`Đã lưu ${rows.length} dòng chi phí vào Sheets!`, 'success');
      onClose();
    } catch(e) {
      toast('Lỗi lưu dữ liệu: ' + e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  const formatAmt = (v) => {
    const n = v.replace(/\D/g,'');
    return n ? parseInt(n).toLocaleString('vi-VN') : '';
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">📝 Nhập Chi Phí Thực Tế</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="alert info">Một NCC có thể nhập nhiều hạng mục trong cùng 1 bill. Nhấn "+ Thêm hạng mục" để thêm dòng.</div>
          
          {/* Step 1 */}
          <div style={{marginBottom:16,fontWeight:600,fontSize:12,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Thông tin chứng từ</div>
          <div className="form-grid cols2" style={{marginBottom:16}}>
            <div className="form-group">
              <label className="form-label required">Công trình</label>
              <select className={`form-select ${errors.project_id?'error':''}`} value={form.project_id} onChange={e=>set('project_id',e.target.value)}>
                <option value="">— Chọn công trình —</option>
                {projects.filter(p=>p.status==='Active').map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
              </select>
              {errors.project_id && <span className="form-error">{errors.project_id}</span>}
            </div>
            <div className="form-group">
              <label className="form-label required">Nhà cung cấp</label>
              <select className={`form-select ${errors.supplier_id?'error':''}`} value={form.supplier_id} onChange={e=>set('supplier_id',e.target.value)}>
                <option value="">— Chọn NCC —</option>
                {suppliers.filter(s=>s.status==='Active').map(s=><option key={s.supplier_id} value={s.supplier_id}>{s.supplier_name}</option>)}
              </select>
              {errors.supplier_id && <span className="form-error">{errors.supplier_id}</span>}
            </div>
            <div className="form-group">
              <label className="form-label required">Tháng phát sinh</label>
              <input className={`form-input ${errors.month?'error':''}`} value={form.month} onChange={e=>set('month',e.target.value)} placeholder="MM/YYYY" />
              {errors.month && <span className="form-error">{errors.month}</span>}
            </div>
            <div className="form-group">
              <label className="form-label required">Số chứng từ / Bill</label>
              <input className={`form-input ${errors.bill_ref?'error':''}`} value={form.bill_ref} onChange={e=>set('bill_ref',e.target.value)} placeholder="VD: BILL-TT-001" />
              {errors.bill_ref && <span className="form-error">{errors.bill_ref}</span>}
            </div>
          </div>
          <div className="form-group" style={{marginBottom:20}}>
            <label className="form-label">Link PDF Bill (Google Drive)</label>
            <input className="form-input" value={form.bill_pdf_url} onChange={e=>set('bill_pdf_url',e.target.value)} placeholder="https://drive.google.com/..." />
            <span className="form-hint">Upload PDF lên Drive → chuột phải → Lấy link → paste vào đây</span>
          </div>

          <div className="divider" />

          {/* Step 2: Line items */}
          <div style={{marginBottom:12,fontWeight:600,fontSize:12,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Chi tiết hạng mục</div>
          <div style={{display:'grid',gridTemplateColumns:'2fr 2fr 1fr 32px',gap:8,marginBottom:6,padding:'0 12px'}}>
            <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Hạng mục *</span>
            <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Số tiền (VNĐ, chưa VAT) *</span>
            <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Ghi chú</span>
            <span></span>
          </div>
          <div className="line-items">
            {lines.map((l, i) => (
              <div key={i} className="line-item">
                <div>
                  <select className={`form-select ${errors[`cat_${i}`]?'error':''}`} value={l.category_code} onChange={e=>setLine(i,'category_code',e.target.value)}>
                    <option value="">— Chọn —</option>
                    {CATEGORIES.map(c=><option key={c.code} value={c.code}>{c.name}</option>)}
                  </select>
                  {errors[`cat_${i}`] && <span className="form-error">{errors[`cat_${i}`]}</span>}
                </div>
                <div>
                  <input className={`form-input ${errors[`amt_${i}`]?'error':''}`} value={l.amount} onChange={e=>setLine(i,'amount',formatAmt(e.target.value))} placeholder="320.000.000" style={{textAlign:'right',fontFamily:'var(--mono)'}} />
                  {errors[`amt_${i}`] && <span className="form-error">{errors[`amt_${i}`]}</span>}
                </div>
                <input className="form-input" value={l.notes} onChange={e=>setLine(i,'notes',e.target.value)} placeholder="Ghi chú..." />
                <button className="remove-line" onClick={()=>removeLine(i)} disabled={lines.length===1}>×</button>
              </div>
            ))}
          </div>
          <button className="add-line-btn" onClick={addLine}>+ Thêm hạng mục</button>

          <div className="divider" />
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:13,color:'var(--text3)'}}>Tổng: <span style={{fontFamily:'var(--mono)',color:'var(--amber)',fontWeight:700}}>
              {fmt(lines.reduce((s,l)=>s+(parseInt(l.amount.replace(/\./g,''))||0),0))} VNĐ
            </span></div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" onClick={handleSubmit} disabled={saving}>
            {saving ? <><div className="spinner" style={{width:14,height:14,borderWidth:2}}></div> Đang lưu...</> : '💾 Lưu vào Sheets'}
          </button>
        </div>
      </div>
    </div>
  );
}

function BidBudgetPage({ user, mode }) {
  // mode: 'bid' | 'budget'
  const { projects, bids, budgets, saveBidBudget, setBids, setBudgets } = useData();
  const toast = useToast();
  const [selectedPid, setSelectedPid] = useState('');
  const [lines, setLines] = useState({});
  const [saving, setSaving] = useState(false);
  const isB = mode === 'bid';
  const source = isB ? bids : budgets;
  const SHEET = isB ? 'BID_COST' : 'BUDGET';
  const amtField = isB ? 'bid_amount' : 'budget_amount';
  const totField = isB ? 'total_bid' : 'total_budget';
  const title = isB ? 'Chi Phí Đấu Thầu' : 'Dự Trù Chi Phí';

  useEffect(() => {
    if (!selectedPid) return;
    const existing = {};
    source.filter(b=>b.project_id===selectedPid).forEach(b => {
      existing[b.category_code] = { amount: fmt(parseFloat(b[amtField])), unit: b.unit||'Hệ', notes: b.notes||'' };
    });
    const init = {};
    CATEGORIES.forEach(c => {
      init[c.code] = existing[c.code] || { amount:'', unit:'Hệ', notes:'' };
    });
    setLines(init);
  }, [selectedPid, mode]);

  const setLine = (code, k, v) => setLines(l => ({...l, [code]: {...l[code],[k]:v}}));
  const formatAmt = v => { const n=v.replace(/\D/g,''); return n?parseInt(n).toLocaleString('vi-VN'):''; };

  const handleSave = async () => {
    if (!selectedPid) { toast('Chọn công trình trước', 'error'); return; }
    setSaving(true);
    try {
      const rows = CATEGORIES.map(c => {
        const l = lines[c.code]||{};
        const amt = parseFloat((l.amount||'').replace(/\./g,''))||0;
        return [selectedPid,c.code,c.name,String(amt),1,l.unit||'Hệ',String(amt),user.name,todayStr(),l.notes||''];
      }).filter(r => parseFloat(r[3]) > 0);
      const fields = ['project_id','category_code','category_name',amtField,'quantity','unit',totField,'updated_by','updated_at','notes'];
      const setFn = isB ? setBids : setBudgets;
      await saveBidBudget(SHEET, rows, setFn, fields, selectedPid);
      toast(`Đã lưu ${title} cho ${selectedPid}!`, 'success');
    } catch(e) { toast('Lỗi: '+e.message, 'error'); } finally { setSaving(false); }
  };

  const total = Object.values(lines).reduce((s,l) => s+(parseFloat((l.amount||'').replace(/\./g,''))||0), 0);

  return (
    <div>
      <div className="section-header mb-20">
        <div><div className="section-title">{title}</div><div className="section-sub">Nhập theo công trình và hạng mục</div></div>
      </div>
      <div className="card mb-16">
        <div className="card-body" style={{padding:'16px 20px'}}>
          <div style={{display:'flex',gap:16,alignItems:'flex-end'}}>
            <div className="form-group" style={{margin:0,flex:1}}>
              <label className="form-label">Chọn công trình</label>
              <select className="form-select" value={selectedPid} onChange={e=>setSelectedPid(e.target.value)}>
                <option value="">— Chọn công trình —</option>
                {projects.map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
              </select>
            </div>
          </div>
        </div>
      </div>

      {selectedPid && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">{isB?'Đơn giá đấu thầu':'Dự trù chi phí'} — {selectedPid}</span>
            <span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--amber)',fontWeight:700}}>Tổng: {fmtB(total)}</span>
          </div>
          <div className="card-body">
            <div style={{display:'grid',gridTemplateColumns:'2fr 2fr 1fr 2fr',gap:8,marginBottom:8,padding:'0 4px'}}>
              <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Hạng mục</span>
              <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Số tiền (VNĐ, chưa VAT)</span>
              <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Đơn vị</span>
              <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Ghi chú</span>
            </div>
            {CATEGORIES.map(c => {
              const l = lines[c.code]||{amount:'',unit:'Hệ',notes:''};
              return (
                <div key={c.code} style={{display:'grid',gridTemplateColumns:'2fr 2fr 1fr 2fr',gap:8,marginBottom:8,alignItems:'center'}}>
                  <div style={{fontWeight:500,fontSize:13,padding:'9px 0'}}>{c.name}</div>
                  <input className="form-input" value={l.amount} onChange={e=>setLine(c.code,'amount',formatAmt(e.target.value))} placeholder="0" style={{textAlign:'right',fontFamily:'var(--mono)'}} />
                  <select className="form-select" value={l.unit} onChange={e=>setLine(c.code,'unit',e.target.value)}>
                    <option>Hệ</option><option>Lần</option><option>Tháng</option><option>m²</option><option>m</option>
                  </select>
                  <input className="form-input" value={l.notes} onChange={e=>setLine(c.code,'notes',e.target.value)} placeholder="Ghi chú..." />
                </div>
              );
            })}
            <div className="divider" />
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,color:'var(--text3)'}}>Tổng {title}: <span style={{fontFamily:'var(--mono)',color:'var(--amber)',fontWeight:700}}>{fmtB(total)}</span></span>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Đang lưu...':'💾 Lưu vào Sheets'}</button>
            </div>
          </div>
        </div>
      )}

      {!selectedPid && (
        <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">Chọn công trình để nhập {title.toLowerCase()}</div></div>
      )}
    </div>
  );
}

            <div className="modal-body">
              <div className="form-grid" style={{gap:14}}>
                <div className="form-group"><label className="form-label required">Email Google</label><input className="form-input" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="user@gmail.com" /></div>
                <div className="form-group"><label className="form-label">Họ tên</label><input className="form-input" value={form.full_name} onChange={e=>set('full_name',e.target.value)} /></div>
                <div className="form-group"><label className="form-label">Role</label>
                  <select className="form-select" value={form.role} onChange={e=>set('role',e.target.value)}>
                    <option value="viewer">Viewer — Chỉ xem Dashboard</option>
                    <option value="editor">Editor — Nhập dữ liệu + xem</option>
                    <option value="admin">Admin — Toàn quyền</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowForm(false)}>Hủy</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Đang lưu...':'💾 Lưu'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP SHELL
// ============================================================
const NAV_ITEMS = [
  { id:'dashboard', label:'Dashboard', icon:'📊', roles:['admin','editor','viewer'] },
  { id:'actual', label:'Chi Phí Thực Tế', icon:'📝', roles:['admin','editor'] },
  { id:'bid', label:'Đấu Thầu', icon:'🏷️', roles:['admin','editor'] },
  { id:'budget', label:'Dự Trù', icon:'📋', roles:['admin','editor'] },
  { id:'projects', label:'Dự Án', icon:'🏗️', roles:['admin','editor'] },
  { id:'suppliers', label:'Nhà Cung Cấp', icon:'🏢', roles:['admin','editor'] },
  { id:'users', label:'Người Dùng', icon:'👥', roles:['admin'] },
];

function AppShell({ user, token, requestToken, logout }) {
  const [page, setPage] = useState('dashboard');

  const visibleNav = NAV_ITEMS.filter(n => n.roles.includes(user.role));

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <Dashboard user={user} />;
      case 'actual': return <ActualCostList user={user} token={token} />;
      case 'bid': return <BidBudgetPage user={user} mode="bid" />;
      case 'budget': return <BidBudgetPage user={user} mode="budget" />;
      case 'projects': return <ProjectsPage user={user} token={token} />;
      case 'suppliers': return <SuppliersPage user={user} />;
      case 'users': return <UsersPage user={user} />;
      default: return <Dashboard user={user} />;
    }
  };

  const currentNav = NAV_ITEMS.find(n=>n.id===page);

  return (
    <DataProvider user={user} token={token} requestToken={requestToken}>
      <div id="app-shell" style={{display:'flex',width:'100%'}}>
        <aside className="sidebar">
          <div className="sidebar-logo">
            <div className="logo-mark">WEALTHCONS</div>
            <div className="logo-title">Chi Phí Thiết Bị</div>
          </div>
          <nav className="sidebar-nav">
            <div className="nav-section">
              <div className="nav-label">Menu</div>
              {visibleNav.map(n => (
                <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
                  <span className="icon">{n.icon}</span>
                  <span>{n.label}</span>
                </div>
              ))}
            </div>
          </nav>
          <div className="sidebar-user">
            <div className="user-info">
              <div className="user-avatar">{user.initials}</div>
              <div>
                <div className="user-name">{user.name}</div>
                <div className="user-role">{user.role}</div>
              </div>
            </div>
            <div className="logout-btn" onClick={logout}>← Đăng xuất</div>
          </div>
        </aside>
        <main className="main">
          <div className="topbar">
            <div className="topbar-title">{currentNav?.icon} {currentNav?.label}</div>
            <div className="topbar-meta">{new Date().toLocaleDateString('vi-VN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
          </div>
          <div className="content">
            {renderPage()}
          </div>
        </main>
      </div>
    </DataProvider>
  );
}

// ============================================================
// ROOT
// ============================================================
function App() {
  const { user, token, loading, login, logout, requestToken } = useAuth();

  if (loading) return (
    <div className="loading-page">
      <div className="spinner"></div>
      <span style={{color:'var(--text3)',fontSize:13}}>Đang khởi động...</span>
    </div>
  );

  if (!user) return <LoginPage onLogin={login} />;
  return <AppShell user={user} token={token} requestToken={requestToken} logout={logout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
</html>
