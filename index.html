<style>
  :root {
    --navy: #0f1b2d;
    --navy2: #162236;
    --navy3: #1e3050;
    --amber: #f59e0b;
    --amber2: #fbbf24;
    --amber-dim: rgba(245,158,11,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-dim: rgba(234,179,8,0.15);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.04);
    --card: rgba(22,34,54,0.95);
    --radius: 10px;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--navy); color: var(--text); min-height: 100vh; font-size: 14px; }
  #root { display: flex; min-height: 100vh; }

  /* SIDEBAR — Desktop only */
  .sidebar { width: 220px; min-height: 100vh; background: var(--navy2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
  .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
  .logo-mark { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--amber); text-transform: uppercase; }
  .logo-title { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 2px; line-height: 1.3; }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-section { padding: 0 12px; margin-bottom: 4px; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; padding: 8px 6px 4px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all 0.15s; margin-bottom: 1px; }
  .nav-item:hover { background: var(--border); color: var(--text); }
  .nav-item.active { background: var(--amber-dim); color: var(--amber); font-weight: 500; }
  .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
  .sidebar-user { padding: 14px 16px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--amber-dim); border: 1.5px solid var(--amber); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--amber); flex-shrink: 0; }
  .user-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .logout-btn { font-size: 11px; color: var(--text3); cursor: pointer; margin-top: 8px; padding: 4px 0; transition: color 0.15s; background: none; border: none; font-family: var(--font); }
  .logout-btn:hover { color: var(--red); }

  /* MAIN */
  .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { height: 56px; background: var(--navy2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 50; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .content { padding: 24px 28px; flex: 1; }

  /* LOGIN — căn giữa hoàn toàn */
  .login-page { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--navy); z-index: 999; }
  .login-card { background: var(--navy2); border: 1px solid var(--border); border-radius: 16px; padding: 44px 40px; width: 380px; max-width: calc(100vw - 32px); text-align: center; }
  .login-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: var(--amber); text-transform: uppercase; margin-bottom: 10px; }
  .login-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
  .login-sub { font-size: 13px; color: var(--text3); margin-bottom: 32px; line-height: 1.6; }
  .login-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 13px 20px; background: var(--amber); color: #0f1b2d; font-family: var(--font); font-size: 14px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .login-btn:hover { background: var(--amber2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(245,158,11,0.3); }
  .login-footer { margin-top: 20px; font-size: 11px; color: var(--text3); line-height: 1.8; }
  .login-author { font-size: 11px; color: var(--amber); font-weight: 500; margin-top: 4px; }

  /* CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-body { padding: 20px; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-card.actual::before { background: var(--amber); }
  .kpi-card.budget::before { background: #60a5fa; }
  .kpi-card.bid::before { background: #a78bfa; }
  .kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--text); font-family: var(--mono); line-height: 1; }
  .kpi-unit { font-size: 13px; font-weight: 400; color: var(--text3); margin-left: 4px; }
  .kpi-diff { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 12px; font-weight: 500; font-family: var(--mono); padding: 2px 8px; border-radius: 20px; }
  .kpi-diff.over { background: var(--red-dim); color: var(--red); }
  .kpi-diff.ok { background: var(--green-dim); color: var(--green); }
  .kpi-diff.warn { background: var(--yellow-dim); color: var(--yellow); }

  /* CHART GRID */
  .chart-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; margin-bottom: 20px; }

  /* FILTERS */
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-right: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--text2); transition: all 0.15s; background: transparent; font-family: var(--font); }
  .pill:hover { border-color: var(--amber); color: var(--amber); }
  .pill.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .select-input { background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 5px 10px; font-size: 12px; font-family: var(--font); cursor: pointer; outline: none; }
  .select-input:focus { border-color: var(--amber); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border2); transition: background 0.12s; cursor: default; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.total-row { background: rgba(245,158,11,0.05); border-top: 1px solid var(--border); }
  tbody td { padding: 10px 14px; font-size: 13px; color: var(--text); }
  td.mono { font-family: var(--mono); font-size: 12px; }
  td.muted { color: var(--text3); }

  /* STATUS BADGE */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: var(--green-dim); color: var(--green); }
  .badge.warn { background: var(--yellow-dim); color: var(--yellow); }
  .badge.over { background: var(--red-dim); color: var(--red); }
  .badge.active { background: rgba(96,165,250,0.12); color: #60a5fa; }
  .badge.closed { background: var(--border); color: var(--text3); }

  /* FORMS */
  .form-grid { display: grid; gap: 16px; }
  .form-grid.cols2 { grid-template-columns: 1fr 1fr; }
  .form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
  .form-label.required::after { content: ' *'; color: var(--amber); }
  .form-input { background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.15s; width: 100%; }
  .form-input:focus { border-color: var(--amber); }
  .form-input::placeholder { color: var(--text3); }
  .form-input.error { border-color: var(--red); }
  .form-select { background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.15s; width: 100%; cursor: pointer; }
  .form-select:focus { border-color: var(--amber); }
  .form-hint { font-size: 11px; color: var(--text3); }
  .form-error { font-size: 11px; color: var(--red); }
  textarea.form-input { resize: vertical; min-height: 80px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: var(--font); transition: all 0.15s; }
  .btn-primary { background: var(--amber); color: #0f1b2d; }
  .btn-primary:hover { background: var(--amber2); }
  .btn-secondary { background: var(--navy3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* MULTI-LINE ITEMS */
  .line-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .line-item { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 8px; align-items: center; background: var(--navy3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; }
  .add-line-btn { display: flex; align-items: center; gap: 6px; color: var(--amber); font-size: 12px; cursor: pointer; padding: 6px 0; background: none; border: none; font-family: var(--font); }
  .add-line-btn:hover { opacity: 0.8; }
  .remove-line { color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color 0.12s; background: none; border: none; }
  .remove-line:hover { color: var(--red); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
  .modal { background: var(--navy2); border: 1px solid var(--border); border-radius: 14px; width: 640px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .modal-close { cursor: pointer; font-size: 20px; line-height: 1; background: none; border: none; color: var(--text3); transition: color 0.12s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; overflow-y: auto; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  /* ALERTS */
  .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .alert.info { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2); color: #93c5fd; }
  .alert.success { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
  .alert.error { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
  .alert.warning { background: var(--yellow-dim); border: 1px solid rgba(234,179,8,0.2); color: #fde047; }

  /* SPINNER */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 12px; }
  .loading-page .spinner { width: 32px; height: 32px; border-width: 3px; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .section-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* PROGRESS BAR */
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* TOAST */
  .toast-container { position: fixed; top: 70px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--navy2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.2s ease; min-width: 280px; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--amber); }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* MISC */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .text-mono { font-family: var(--mono); }
  .text-amber { color: var(--amber); }
  .text-red { color: var(--red); }
  .text-green { color: var(--green); }
  .text-muted { color: var(--text3); }
  .text-sm { font-size: 12px; }
  .font-bold { font-weight: 700; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .mt-auto { margin-top: auto; }
  .w-full { width: 100%; }
  .text-right { text-align: right; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* MOBILE BOTTOM TAB BAR */
  .mobile-tabbar { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--navy2); border-top: 1px solid var(--border); z-index: 100; flex-direction: row; align-items: stretch; }
  .mobile-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; color: var(--text3); transition: color 0.15s; font-size: 10px; font-weight: 500; border: none; background: none; font-family: var(--font); }
  .mobile-tab.active { color: var(--amber); }
  .mobile-tab-icon { font-size: 20px; line-height: 1; }

  /* MOBILE CARDS (Chi phí list) */
  .mobile-cost-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .mobile-cost-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .mobile-cost-amount { font-size: 18px; font-weight: 700; color: var(--amber); font-family: var(--mono); }
  .mobile-cost-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .mobile-cost-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* MOBILE SUMMARY TABLE */
  .mobile-summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .mobile-summary-table th { padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); }
  .mobile-summary-table td { padding: 9px 10px; border-bottom: 1px solid var(--border2); }
  .mobile-summary-table tr.total-row td { background: rgba(245,158,11,0.05); font-weight: 700; border-top: 1px solid var(--border); }

  /* MOBILE PROJECT CARD */
  .mobile-project-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding-bottom: 60px; }
    .topbar { padding: 0 16px; }
    .topbar-meta { display: none; }
    .content { padding: 16px; }
    .kpi-grid { grid-template-columns: 1fr; gap: 10px; }
    .chart-grid { grid-template-columns: 1fr; }
    .form-grid.cols2, .form-grid.cols3 { grid-template-columns: 1fr; }
    .line-item { grid-template-columns: 1fr 1fr; }
    .mobile-tabbar { display: flex; }
    .toast-container { top: auto; bottom: 70px; right: 12px; left: 12px; }
    .toast { min-width: unset; }
    /* Ẩn các nút nhập liệu trên mobile */
    .desktop-only { display: none !important; }
  }
  @media (min-width: 769px) {
    .mobile-only { display: none !important; }
  }
</style>

const fmt = (n) => {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('vi-VN');
};
// Đơn vị động: ≥1 tỷ → X.XX tỷ | ≥1 triệu → XXX tr | còn lại → số nguyên
const fmtM = (n) => {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  if (num === 0) return '0';
  const abs = Math.abs(num);
  if (abs >= 1e9) return (num/1e9).toFixed(2) + ' tỷ';
  if (abs >= 1e6) return Math.round(num/1e6) + ' tr';
  return Math.round(num).toLocaleString('vi-VN');
};
// Giữ fmtB cho backward compat — dùng fmtM từ giờ
const fmtB = fmtM;
const fmtPct = (a, b) => {
  if (!b || b === 0) return null;
  return Math.round((a / b) * 100);
};
const statusBadge = (pct) => {
  if (pct === null) return null;
  if (pct < 80) return 'ok';
  if (pct <= 100) return 'warn';
  return 'over';
};
const statusLabel = (pct) => {
  if (pct === null) return '—';
  if (pct < 80) return 'Tốt';
  if (pct <= 100) return 'Chú ý';
  return 'Vượt DT';
};
const nowMonth = () => {
  const d = new Date();
  return String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
};
const parseMonth = (s) => {
  if (!s) return null;
  const [m, y] = s.split('/');
  return { month: parseInt(m), year: parseInt(y) };
};
const monthYear = (s) => {
  const p = parseMonth(s);
  if (!p) return s;
  return `T${p.month}/${p.year}`;
};
const todayStr = () => {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
};
const genId = (prefix) => `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,6).toUpperCase()}`;

// Sheets API
const sheetsGet = async (token, range) => {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}?key=${CONFIG.API_KEY}`;
  const headers = token ? { Authorization: `Bearer ${token}` } : {};
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`Sheets GET error: ${res.status}`);
  const data = await res.json();
  return data.values || [];
};

const sheetsAppend = async (token, range, values) => {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values }),
  });
  if (!res.ok) throw new Error(`Sheets APPEND error: ${res.status}`);
  return await res.json();
};

const sheetsUpdate = async (token, range, values) => {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values }),
  });
  if (!res.ok) throw new Error(`Sheets UPDATE error: ${res.status}`);
  return await res.json();
};

// Xóa 1 dòng trong sheet theo row number (dùng batchUpdate deleteRows)
const sheetsDeleteRow = async (token, sheetId, rowIndex) => {
  // rowIndex: 0-based
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}:batchUpdate`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      requests: [{
        deleteDimension: {
          range: { sheetId, dimension: 'ROWS', startIndex: rowIndex, endIndex: rowIndex + 1 }
        }
      }]
    }),
  });
  if (!res.ok) throw new Error('Delete row error: ' + res.status);
};

// Lấy sheetId theo tên sheet
const getSheetId = async (token, sheetName) => {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}?fields=sheets.properties`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  const data = await res.json();
  const sheet = data.sheets?.find(s => s.properties.title === sheetName);
  return sheet?.properties?.sheetId ?? null;
};
const driveUpload = async (token, file, fileName) => {
  // Bước 1: Tạo metadata
  const metadata = {
    name: fileName,
    parents: [CONFIG.DRIVE_FOLDER_ID],
    mimeType: 'application/pdf',
  };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', file);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}` },
    body: form,
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Drive upload failed: ' + res.status);
  }
  const data = await res.json();
  // Bước 2: Set permission public view để link hoạt động
  await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: 'reader', type: 'anyone' }),
  });
  return `https://drive.google.com/file/d/${data.id}/view`;
};
const parseRows = (rows, fields) => {
  if (!rows || rows.length < 2) return [];
  return rows.slice(1).map(row => {
    const obj = {};
    fields.forEach((f, i) => { obj[f] = row[i] || ''; });
    return obj;
  });
};

const { useState, useEffect, useRef, useCallback } = React;

const ToastContext = React.createContext(null);
const useToast = () => React.useContext(ToastContext);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastContext.Provider value={add}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>
            <span>{t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'}</span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

// Đọc whitelist từ sheet USERS (cột A=email, cột B=role)
// Dùng OAuth token — không cần sheet public
const checkWhitelist = async (accessToken, email) => {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/USERS!A:D`;
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const rows = (data.values || []).slice(1); // bỏ header
    const found = rows.find(r => (r[0]||'').toLowerCase().trim() === email.toLowerCase().trim());
    if (found) {
      return { role: found[1] || 'viewer', full_name: found[2] || '', status: found[3] || 'Active' };
    }
    return null; // không có trong whitelist → mặc định viewer
  } catch(e) {
    console.warn('checkWhitelist error:', e.message);
    return null;
  }
};

// Lưu session vào localStorage
const saveSession = (sessionObj) => {
  localStorage.setItem('wc_session', JSON.stringify(sessionObj));
};
const loadSession = () => {
  try { return JSON.parse(localStorage.getItem('wc_session') || 'null'); }
  catch(e) { return null; }
};
const clearSession = () => {
  localStorage.removeItem('wc_session');
  localStorage.removeItem('wc_token');
  localStorage.removeItem('wc_token_exp');
};

// ============================================================
// AUTH HOOK
// ============================================================
function useAuth() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [loading, setLoading] = useState(true); // true = đang verify session

  // Khi load trang: đọc localStorage, verify role mới nhất từ Sheet
  useEffect(() => {
    const session = loadSession();
    const savedToken = localStorage.getItem('wc_token');
    const savedExp = parseInt(localStorage.getItem('wc_token_exp') || '0');
    const tokenValid = savedToken && savedExp > Date.now() + 60000;

    if (session && tokenValid) {
      // Có session + token còn hạn → set user ngay để UI render,
      // sau đó verify lại role từ Sheet
      setToken(savedToken);
      setUser(session);
      checkWhitelist(savedToken, session.email).then(wl => {
        if (wl && wl.status === 'Active') {
          const updated = { ...session, role: wl.role };
          setUser(updated);
          saveSession(updated);
        } else if (wl === null) {
          // Không tìm thấy trong sheet → giữ role cũ (viewer fallback)
          const updated = { ...session, role: session.role || 'viewer' };
          setUser(updated);
          saveSession(updated);
        } else {
          // status Inactive → logout
          clearSession();
          setUser(null);
          setToken(null);
        }
        setLoading(false);
      });
    } else {
      // Không có session hoặc token hết hạn → preload GIS rồi show login
      if (!window.google?.accounts) {
        const s = document.createElement('script');
        s.src = 'https://accounts.google.com/gsi/client';
        s.async = true;
        s.onload = () => setLoading(false);
        s.onerror = () => setLoading(false);
        document.head.appendChild(s);
      } else {
        setLoading(false);
      }
    }
  }, []);

  const login = (sessionObj, accessToken) => {
    saveSession(sessionObj);
    localStorage.setItem('wc_token', accessToken);
    localStorage.setItem('wc_token_exp', String(Date.now() + 3500 * 1000));
    setToken(accessToken);
    setUser(sessionObj);
  };

  const logout = () => {
    clearSession();
    setUser(null);
    setToken(null);
    if (window.google?.accounts?.oauth2 && token) {
      google.accounts.oauth2.revoke(token);
    }
  };

  return { user, token, loading, login, logout };
}

// LOGIN PAGE
// ============================================================
function LoginPage({ onLogin }) {
  const [step, setStep] = useState('idle'); // idle | loading | verify | error
  const [error, setError] = useState('');

  const handleLogin = () => {
    setError('');
    setStep('loading');

    const doOAuth = () => {
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        // Chỉ cần scope Sheets để đọc whitelist + ghi data
        // userinfo.email/profile để lấy thông tin user
        scope: [
          'https://www.googleapis.com/auth/spreadsheets',
          'https://www.googleapis.com/auth/userinfo.email',
          'https://www.googleapis.com/auth/userinfo.profile',
        ].join(' '),
        // QUAN TRỌNG: không có redirect_uri trong token flow
        callback: async (resp) => {
          if (resp.error) {
            setStep('error');
            setError('Lỗi OAuth: ' + (resp.error_description || resp.error));
            return;
          }

          const accessToken = resp.access_token;

          // Bước 1: Lấy thông tin user từ Google userinfo API
          try {
            const infoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: 'Bearer ' + accessToken }
            });
            if (!infoRes.ok) throw new Error('userinfo HTTP ' + infoRes.status);
            const info = await infoRes.json();

            const email = (info.email || '').toLowerCase().trim();
            const name = info.name || email;
            const given_name = info.given_name || name;
            const picture = info.picture || '';

            setStep('verify');

            // Bước 2: Tra email vào whitelist (sheet USERS)
            const wl = await checkWhitelist(accessToken, email);

            let role = 'viewer'; // mặc định nếu không có trong sheet
            if (wl && wl.status === 'Active') {
              role = wl.role;
            } else if (wl && wl.status !== 'Active') {
              setStep('error');
              setError('Tài khoản đã bị vô hiệu hóa. Liên hệ Admin.');
              return;
            }
            // wl === null → không có trong sheet → viewer

            // Bước 3: Tạo session object và đăng nhập
            const session = { email, name, given_name, picture, role,
              initials: name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)
            };

            onLogin(session, accessToken);

          } catch(e) {
            setStep('error');
            setError('Lỗi lấy thông tin tài khoản: ' + e.message);
          }
        },
        error_callback: (err) => {
          setStep('idle');
          if (err.type !== 'popup_closed') {
            setError('Lỗi: ' + (err.message || err.type));
          }
        },
      });

      // requestAccessToken gọi trực tiếp trong click handler → Chrome không block popup
      tc.requestAccessToken({ prompt: 'select_account' });
    };

    // GIS đã được preload khi trang load → luôn available ở đây
    if (window.google?.accounts?.oauth2) {
      doOAuth();
    } else {
      setStep('error');
      setError('Thư viện Google chưa sẵn sàng. Reload trang và thử lại.');
    }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">WEALTHCONS</div>
        <div className="login-title">Hệ Thống Quản Lý<br/>Chi Phí Thuê Thiết Bị</div>
        <div className="login-sub">Dành cho nhân viên Wealthcons Construction</div>

        {error && (
          <div className="alert error" style={{marginBottom:16,textAlign:'left'}}>
            <span>✕</span><span>{error}</span>
          </div>
        )}

        {(step === 'loading' || step === 'verify') ? (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'13px 20px',background:'rgba(245,158,11,0.1)',borderRadius:8,color:'var(--amber)'}}>
            <div className="spinner"></div>
            <span>{step === 'verify' ? 'Đang xác thực quyền truy cập...' : 'Đang mở Google...'}</span>
          </div>
        ) : (
          <button className="login-btn" onClick={handleLogin}>
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Đăng nhập bằng Google
          </button>
        )}

        <div className="login-footer">
          Phiên bản 1.0 · {new Date().getFullYear()}<br/>
          <span className="login-author">Người phát hành: Lê Trần Anh Toàn</span>
        </div>
      </div>
    </div>
  );
}

const DataContext = React.createContext(null);
const useData = () => React.useContext(DataContext);

// Tìm số dòng trong sheet theo giá trị cột A (1-indexed, kể cả header)
const sheetsFindRow = async (token, sheetName, colAValue) => {
  const rows = await sheetsGet(token, `${sheetName}!A:A`);
  const idx = rows.findIndex((r, i) => i > 0 && (r[0]||'').toString().trim() === colAValue.toString().trim());
  return idx === -1 ? -1 : idx + 1; // 1-indexed
};

// Overwrite một dòng theo row number
const sheetsOverwriteRow = async (token, sheetName, rowNum, values) => {
  const range = `${sheetName}!A${rowNum}`;
  await sheetsUpdate(token, range, [values]);
};

    try {
      const [pRows, sRows, aRows, bRows, buRows, cRows] = await Promise.all([
        sheetsGet(token, SHEETS.PROJECTS),

  const deleteProject = async (projectId) => {
    const rowNum = await sheetsFindRow(token, 'PROJECTS', projectId);
    if (rowNum < 0) throw new Error('Không tìm thấy dự án trong sheet');
    const sheetId = await getSheetId(token, 'PROJECTS');
    await sheetsDeleteRow(token, sheetId, rowNum - 1); // 0-based
    setProjects(prev => prev.filter(p => p.project_id !== projectId));
  };

  // DELETE SUPPLIER
  const deleteSupplier = async (supplierId) => {
    const rowNum = await sheetsFindRow(token, 'SUPPLIERS', supplierId);
    if (rowNum < 0) throw new Error('Không tìm thấy NCC trong sheet');
    const sheetId = await getSheetId(token, 'SUPPLIERS');
    await sheetsDeleteRow(token, sheetId, rowNum - 1);
    setSuppliers(prev => prev.filter(s => s.supplier_id !== supplierId));
  };

  // DELETE USER
  const deleteUser = async (email) => {
    const rowNum = await sheetsFindRow(token, 'USERS', email);
    if (rowNum < 0) throw new Error('Không tìm thấy user trong sheet');
    const sheetId = await getSheetId(token, 'USERS');
    await sheetsDeleteRow(token, sheetId, rowNum - 1);
    setUsers(prev => prev.filter(u => u.email !== email));
  };

  // USER — append
  const appendUser = async (row) => {
    await sheetsAppend(token, 'USERS!A:D', [row]);
    const u = { email:row[0], role:row[1], full_name:row[2], status:row[3] };
    setUsers(prev => [...prev, u]);
  };

  // BID/BUDGET — xóa tất cả dòng cũ theo project_id rồi append mới
  // Vì Sheets API không có delete row dễ, ta dùng cách: load lại tất cả, lọc bỏ pid cũ, ghi lại toàn bộ
  const overwriteBidBudget = async (sheetName, pid, newRows, isB) => {
    // Load toàn bộ sheet hiện tại
    const allRows = await sheetsGet(token, `${sheetName}!A:J`);
    if (!allRows || allRows.length === 0) {
      await sheetsAppend(token, `${sheetName}!A:J`, newRows);
      return;
    }
    const header = allRows[0];
    const dataRows = allRows.slice(1).filter(r => (r[0]||'') !== pid); // giữ các dự án khác
    const combined = [header, ...dataRows, ...newRows];
    // Clear toàn bộ sheet rồi ghi lại
    const clearUrl = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}:clear`;
    await fetch(clearUrl, { method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' } });
    await sheetsUpdate(token, `${sheetName}!A1`, combined);
    // Update state
    const fields = isB
      ? ['project_id','category_code','category_name','bid_amount','quantity','unit','total_bid','updated_by','updated_at','notes']
      : ['project_id','category_code','category_name','budget_amount','quantity','unit','total_budget','updated_by','updated_at','notes'];
    const newItems = newRows.map(r => { const obj={}; fields.forEach((f,i) => obj[f]=r[i]||''); return obj; });
    if (isB) setBids(prev => [...prev.filter(x=>x.project_id!==pid), ...newItems]);
    else setBudgets(prev => [...prev.filter(x=>x.project_id!==pid), ...newItems]);
  };

  return (
    <DataContext.Provider value={{ projects, suppliers, actuals, bids, budgets, categories, users, loadingData, loadAll, appendActual, updateActual, saveProject, saveSupplier, appendUser, overwriteBidBudget, deleteProject, deleteSupplier, deleteUser }}>
      {children}
    </DataContext.Provider>
  );
}

function BarChart({ data, labels, datasets }) {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11, family: "'IBM Plex Sans'" }, boxWidth: 12, boxHeight: 12 } }, tooltip: { callbacks: { label: ctx => ' ' + fmtB(ctx.raw) } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 }, callback: v => fmtB(v) } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{width:'100%',height:'220px'}} />;
}

function DonutChart({ labels, data, colors, showPctLabels = false }) {
  const ref = useRef();
  const chartRef = useRef();
  const isMobile = window.innerWidth <= 768;

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!ref.current) return;
    const total = data.reduce((s,v)=>s+v,0);
    chartRef.current = new Chart(ref.current, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 1, borderColor: '#162236' }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: {
          legend: {
            position: isMobile ? 'bottom' : 'right',
            labels: {
              color: '#e2e8f0',
              font: { size: isMobile ? 10 : 11, family: "'IBM Plex Sans'" },
              boxWidth: 10, padding: isMobile ? 6 : 10,
              // Hiện % trong legend
              generateLabels: (chart) => {
                const ds = chart.data.datasets[0];
                return chart.data.labels.map((label, i) => {
                  const val = ds.data[i];
                  const pct = total > 0 ? Math.round(val/total*100) : 0;
                  return {
                    text: isMobile ? `${label} ${pct}%` : `${label}`,
                    fillStyle: ds.backgroundColor[i],
                    strokeStyle: ds.backgroundColor[i],
                    fontColor: '#e2e8f0',
                    index: i,
                  };
                });
              },
            },
          },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                const val = ctx.raw;
                const pct = total > 0 ? Math.round(val/total*100) : 0;
                return ` ${ctx.label}: ${fmtM(val)} (${pct}%)`;
              }
            }
          },
          // Plugin hiện % trực tiếp trên slice (desktop)
          datalabels: false,
        },
      },
      // Plugin inline để vẽ % lên slice
      plugins: [{
        id: 'pctLabels',
        afterDraw(chart) {
          if (isMobile) return; // Mobile dùng tooltip/tap thôi
          const { ctx, chartArea } = chart;
          const ds = chart.getDatasetMeta(0);
          const tot = chart.data.datasets[0].data.reduce((s,v)=>s+v,0);
          if (!tot) return;
          ds.data.forEach((arc, i) => {
            const pct = Math.round(chart.data.datasets[0].data[i]/tot*100);
            if (pct < 5) return; // Bỏ qua slice quá nhỏ
            const { x, y } = arc.tooltipPosition();
            ctx.save();
            ctx.font = 'bold 11px IBM Plex Sans, sans-serif';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(pct + '%', x, y);
            ctx.restore();
          });
        }
      }],
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(data), JSON.stringify(colors)]);
  return <canvas ref={ref} style={{width:'100%',height:'100%'}} />;
}

function LineChart({ labels, datasets }) {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } }, tooltip: { callbacks: { label: ctx => ' ' + fmtB(ctx.raw) } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 45 } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 }, callback: v => fmtB(v) } },
          y1: { position: 'right', grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 }, callback: v => fmtB(v) } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{width:'100%',height:'220px'}} />;
}

const isActiveSupplier = (s) => s.status === 'Active' || s.status === 'Đang hoạt động' || s.status === 'active';
  ...projects.filter(p => isActive(p.status)),
  ...projects.filter(p => !isActive(p.status)),
];

const projectStatusLabel = (s) => s === 'Active' ? 'Đang hoạt động' : s === 'Closed' ? 'Đã kết thúc' : s;
const projectStatusBadge = (s) => (s === 'Active' || s === 'Đang hoạt động') ? 'active' : 'closed';

function Dashboard({ user }) {
  const { projects, actuals, bids, budgets, suppliers, categories } = useData();
  const [yearFilter, setYearFilter] = useState('all');
  const [projectFilter, setProjectFilter] = useState('all'); // 'all' hoặc 1 project_id
  const [donutMode, setDonutMode] = useState('cat');

  const years = [...new Set(actuals.map(a => parseMonth(a.month)?.year).filter(Boolean))].sort();
  const sortedProjects = sortProjects(projects);

  const filtered = actuals.filter(a => {
    const p = parseMonth(a.month);
    if (yearFilter !== 'all' && p?.year !== parseInt(yearFilter)) return false;
    if (projectFilter !== 'all' && a.project_id !== projectFilter) return false;
    return true;
  });

  const activePids = projectFilter === 'all'
    ? projects.map(p => p.project_id) // tất cả dự án
    : [projectFilter];

  const totalActual = filtered.reduce((s,a) => s+(parseFloat(a.amount)||0), 0);
  const totalBid = bids.filter(b => activePids.includes(b.project_id)).reduce((s,b) => s+(parseFloat(b.total_bid)||0), 0);
  const totalBudget = budgets.filter(b => activePids.includes(b.project_id)).reduce((s,b) => s+(parseFloat(b.total_budget)||0), 0);
  const pct = fmtPct(totalActual, totalBudget);

  // Bar chart — chỉ hiện khi chọn "Tất cả"
  const barProjects = sortedProjects.filter(p => p.status === 'Active' || p.status === 'Đang hoạt động');
  const barLabels = barProjects.map(p => p.short_name || p.project_id);
  const barActual = barProjects.map(p => actuals.filter(a => a.project_id === p.project_id && (yearFilter==='all'||parseMonth(a.month)?.year===parseInt(yearFilter))).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  const barBudget = barProjects.map(p => budgets.filter(b=>b.project_id===p.project_id).reduce((s,b)=>s+(parseFloat(b.total_budget)||0),0));
  const barBid = barProjects.map(p => bids.filter(b=>b.project_id===p.project_id).reduce((s,b)=>s+(parseFloat(b.total_bid)||0),0));

  // Donut
  const COLORS = ['#f59e0b','#60a5fa','#a78bfa','#34d399','#f87171','#fb923c','#818cf8'];
  let donutLabels, donutData;
  if (donutMode === 'cat') {
    donutLabels = categories.map(c => c.name);
    donutData = categories.map(c => filtered.filter(a=>a.category_code===c.code).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  } else {
    const sids = [...new Set(filtered.map(a=>a.supplier_id))];
    donutLabels = sids.map(sid => suppliers?.find(s=>s.supplier_id===sid)?.short_code||sid);
    donutData = sids.map(sid => filtered.filter(a=>a.supplier_id===sid).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  }

  // Timeline
  const allMonths = [...new Set(actuals.map(a=>a.month))].sort((a,b)=>{
    const pa=parseMonth(a),pb=parseMonth(b);
    if(!pa||!pb) return 0;
    return (pa.year*12+pa.month)-(pb.year*12+pb.month);
  });
  const displayMonths = allMonths.filter(m=>{
    const p=parseMonth(m);
    if(yearFilter!=='all'&&p?.year!==parseInt(yearFilter)) return false;
    return true;
  });
  const timelineActual = displayMonths.map(m=>filtered.filter(a=>a.month===m).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
  let cum=0;

  // Bảng chi tiết: Công trình × Hạng mục

        <div className="card mb-16">

                <th>Dự án</th>

                <th style={{textAlign:'right'}}>Dự trù</th>

                <th style={{textAlign:'right'}}>Tỉ lệ</th>
              </tr></thead>
              <tbody>
                {sortedProjects.map(p=>{
                  const pActual = filtered.filter(a=>a.project_id===p.project_id).reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
                  const pBudget = budgets.filter(b=>b.project_id===p.project_id).reduce((s,b)=>s+(parseFloat(b.total_budget)||0),0);
                  const pBid = bids.filter(b=>b.project_id===p.project_id).reduce((s,b)=>s+(parseFloat(b.total_bid)||0),0);
                  const p2 = fmtPct(pActual,pBudget);
                  if(pActual===0&&pBudget===0&&pBid===0) return null;
                  return (

                <tr className="total-row">

                  <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:700}}>{fmtB(totalBid)}</td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:pct>100?'var(--red)':pct>80?'var(--yellow)':'var(--green)'}}>{pct!==null?pct+'%':'—'}</td>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {/* Donut 1: Hạng mục */}

            <div style={{padding:'10px 12px 4px',fontSize:12,fontWeight:600,color:'var(--text)'}}>Theo Hạng Mục</div>
            <div style={{height:160}}>
              <DonutChart
                labels={categories.map(c=>c.name)}
                data={categories.map(c=>filtered.filter(a=>a.category_code===c.code).reduce((s,a)=>s+(parseFloat(a.amount)||0),0))}
                colors={COLORS}
              />
            </div>
          </div>
          {/* Donut 2: NCC */}
          <div className="card">
            <div style={{padding:'10px 12px 4px',fontSize:12,fontWeight:600,color:'var(--text)'}}>Theo NCC</div>
            <div style={{height:160}}>
              {(() => {
                const sids = [...new Set(filtered.map(a=>a.supplier_id))].slice(0,6);
                const nccLabels = sids.map(sid=>suppliers?.find(s=>s.supplier_id===sid)?.short_code||sid);
                const nccData = sids.map(sid=>filtered.filter(a=>a.supplier_id===sid).reduce((s,a)=>s+(parseFloat(a.amount)||0),0));
                return <DonutChart labels={nccLabels} data={nccData} colors={COLORS}/>;
              })()}
            </div>
          </div>
        </div>

        {/* Timeline mobile */}
        <div className="card mb-16">
          <div className="card-header"><span className="card-title">Chi Phí Theo Tháng</span></div>
          <div className="card-body" style={{height:180}}>
            <LineChart labels={displayMonths.map(monthYear)} datasets={[
              {label:'Thực tế',data:timelineActual,backgroundColor:'rgba(245,158,11,0.7)',borderRadius:3,type:'bar',order:2},
              {label:'Lũy kế',data:timelineCumul,borderColor:'#60a5fa',backgroundColor:'transparent',type:'line',yAxisID:'y1',tension:0.3,pointRadius:2,order:1},
            ]}/>
          </div>
        </div>

        {/* 2 Donut riêng — fix 3 */}
        <div className="card">
          <div className="card-header"><span className="card-title">Chi Tiết Dự Án - Hạng Mục</span></div>
          <div style={{overflowX:'auto'}}>
            <table className="mobile-summary-table">
              <thead><tr>
                <th>Dự án</th>
                <th>Hạng mục</th>
                <th style={{textAlign:'right'}}>Thực tế</th>
                <th style={{textAlign:'right'}}>Dự trù</th>
                <th style={{textAlign:'right'}}>Đấu thầu</th>
                <th style={{textAlign:'right'}}>%</th>
              </tr></thead>
              <tbody>
                {tableRows.length===0 && <tr><td colSpan={6} style={{textAlign:'center',padding:24,color:'var(--text3)'}}>Chưa có dữ liệu</td></tr>}

                  <tr key={i}>
                    <td style={{fontSize:11,fontWeight:500}}>{r.project_id}</td>
                    <td style={{fontSize:11}}>{r.cat_name}</td>
                    <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',fontWeight:700}}>{fmtB(r.actual)}</td>
                    <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11}}>{fmtB(r.budget)}</td>
                    <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11}}>{fmtB(r.bid)}</td>
                    <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:r.pct>100?'var(--red)':r.pct>80?'var(--yellow)':'var(--green)'}}>{r.pct!==null?r.pct+'%':'—'}</td>

// FORM NHẬP / SỬA CHI PHÍ THỰC TẾ
// ============================================================
function ActualCostForm({ user, token, onClose, editData }) {
  const { projects, suppliers, appendActual, updateActual, categories } = useData();
  const toast = useToast();
  const isEdit = !!editData;

  const [form, setForm] = useState({
    project_id:   editData?.project_id   || '',
    supplier_id:  editData?.supplier_id  || '',
    month:        editData?.month        || nowMonth(),
    bill_ref:     editData?.bill_ref     || '',
    bill_pdf_url: editData?.bill_pdf_url || '',
    notes:        editData?.notes        || '',
  });
  const [lines, setLines] = useState(
    isEdit
      ? [{ category_code: editData.category_code, amount: editData.amount ? parseInt(editData.amount).toLocaleString('vi-VN') : '', notes: editData.notes||'' }]
      : [{ category_code:'', amount:'', notes:'' }]
  );
  const [saving, setSaving] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [errors, setErrors] = useState({});
  const [dupWarning, setDupWarning] = useState('');

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const setLine = (i,k,v) => setLines(ls=>ls.map((l,j)=>j===i?{...l,[k]:v}:l));
  const addLine = () => setLines(ls=>[...ls,{category_code:'',amount:'',notes:''}]);
  const removeLine = (i) => setLines(ls=>ls.filter((_,j)=>j!==i));
  const formatAmt = v => { const n=v.replace(/\D/g,''); return n?parseInt(n).toLocaleString('vi-VN'):''; };

  // Auto-generate bill_ref khi đủ 3 trường: project + supplier + month
  const handleFieldChange = (k, v) => {
    const newForm = { ...form, [k]: v };
    setForm(newForm);

    const pid = newForm.project_id;
    const sid = newForm.supplier_id;
    const mon = newForm.month;

    if (pid && sid && mon && !isEdit) {
      // Tạo số chứng từ: BILL-{PROJECT}-{SUPPLIER}-{MM_YYYY}
      const monCode = mon.replace('/', '_');
      const autoRef = `BILL-${pid}-${sid}-${monCode}`;
      setForm(f => ({ ...f, [k]: v, bill_ref: autoRef }));

      // Kiểm tra trùng: cùng project + supplier + month đã có trong actuals chưa
      const dup = actuals.find(a =>
        a.project_id === pid &&
        a.supplier_id === sid &&
        a.month === mon
      );
      if (dup) {
        setDupWarning(`⚠️ Đã có bill cho ${sid} tại ${pid} tháng ${mon} (Mã CT: ${dup.cost_id}). Kiểm tra trước khi lưu tiếp.`);
      } else {
        setDupWarning('');
      }
    }
  };

  // Upload PDF lên Drive
  const handlePdfUpload = async (file) => {
    if (!file || file.type !== 'application/pdf') { toast('Chỉ chấp nhận file PDF', 'error'); return; }
    if (file.size > 20*1024*1024) { toast('File không được quá 20MB', 'error'); return; }
    setUploading(true);
    try {
      const pid = form.project_id || 'UNKNOWN';
      const sid = form.supplier_id || 'UNKNOWN';
      const mon = (form.month||nowMonth()).replace('/','_');
      const ref = (form.bill_ref||'BILL').replace(/\s/g,'_');
      const fileName = `${pid}_${sid}_${mon}_${ref}.pdf`;
      const url = await driveUpload(token, file, fileName);
      set('bill_pdf_url', url);
      toast('Upload PDF thành công!', 'success');
    } catch(e) {
      toast('Lỗi upload: ' + e.message, 'error');
    } finally {
      setUploading(false);
    }
  };

  const validate = () => {
    const e = {};
    if (!form.project_id) e.project_id = 'Chọn công trình';
    if (!form.supplier_id) e.supplier_id = 'Chọn NCC';
    if (!form.month) e.month = 'Nhập tháng';
    if (!isEdit && !form.bill_ref) e.bill_ref = 'Nhập số chứng từ';
    lines.forEach((l,i)=>{
      if (!l.category_code) e[`cat_${i}`]='Chọn hạng mục';
      if (!l.amount||isNaN(l.amount.replace(/\./g,''))) e[`amt_${i}`]='Nhập số tiền';
    });
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleSubmit = async () => {
    if (!validate()) return;
    setSaving(true);
    try {
      if (isEdit) {
        // Edit — overwrite 1 dòng theo cost_id
        const row = [
          editData.cost_id, editData.project_id, editData.supplier_id,
          lines[0].category_code, lines[0].category_code,
          form.month, lines[0].amount.replace(/\./g,''),
          form.bill_ref || editData.bill_ref,
          form.bill_pdf_url,
          editData.input_date, editData.input_by,
          editData.is_verified, editData.verified_by,
          form.notes,
        ];
        await updateActual(editData.cost_id, row);
        toast('Đã cập nhật chi phí!', 'success');
      } else {
        // Thêm mới — append nhiều dòng
        const rows = lines.map(l => [
          genId('C'), form.project_id, form.supplier_id,
          l.category_code, l.category_code, form.month,
          l.amount.replace(/\./g,''), form.bill_ref,
          form.bill_pdf_url, todayStr(), user.name,
          'FALSE', '', l.notes,
        ]);
        await appendActual(rows);
        toast(`Đã lưu ${rows.length} dòng chi phí!`, 'success');
      }
      onClose();
    } catch(e) {
      toast('Lỗi: '+e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{isEdit?'✏️ Chỉnh sửa Chi Phí':'📝 Nhập Chi Phí Thực Tế'}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {!isEdit && <div className="alert info" style={{marginBottom:16}}>Một NCC có thể nhập nhiều hạng mục trong cùng 1 bill.</div>}

          <div style={{marginBottom:12,fontWeight:600,fontSize:12,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Thông tin chứng từ</div>
          {dupWarning && (
            <div className="alert warning" style={{marginBottom:12}}>
              <span>⚠</span><span>{dupWarning}</span>
            </div>
          )}
          <div className="form-grid cols2" style={{marginBottom:16}}>
            <div className="form-group">
              <label className="form-label required">Công trình</label>
              <select className={`form-select ${errors.project_id?'error':''}`} value={form.project_id} onChange={e=>handleFieldChange('project_id',e.target.value)} disabled={isEdit} style={isEdit?{opacity:0.6}:{}}>
                <option value="">— Chọn —</option>
                {projects.filter(p=>isActive(p.status)).map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
              </select>
              {errors.project_id && <span className="form-error">{errors.project_id}</span>}
            </div>
            <div className="form-group">
              <label className="form-label required">Nhà cung cấp</label>
              <select className={`form-select ${errors.supplier_id?'error':''}`} value={form.supplier_id} onChange={e=>handleFieldChange('supplier_id',e.target.value)} disabled={isEdit} style={isEdit?{opacity:0.6}:{}}>
                <option value="">— Chọn —</option>
                {suppliers.filter(s=>isActive(s.status)).map(s=><option key={s.supplier_id} value={s.supplier_id}>{s.supplier_name}</option>)}
              </select>
              {errors.supplier_id && <span className="form-error">{errors.supplier_id}</span>}
            </div>
            <div className="form-group">
              <label className="form-label required">Tháng phát sinh</label>
              <input className={`form-input ${errors.month?'error':''}`} value={form.month} onChange={e=>handleFieldChange('month',e.target.value)} placeholder="MM/YYYY" />
              {errors.month && <span className="form-error">{errors.month}</span>}
            </div>
            <div className="form-group">
              <label className="form-label required">Số chứng từ</label>
              <input className={`form-input ${errors.bill_ref?'error':''}`} value={form.bill_ref} onChange={e=>set('bill_ref',e.target.value)} placeholder="Tự điền khi chọn đủ Công trình + NCC + Tháng" />
              <span className="form-hint">Tự động tạo theo: BILL-{'{'}DỰ ÁN{'}'}-{'{'}NCC{'}'}-{'{'}THÁNG{'}'}</span>
              {errors.bill_ref && <span className="form-error">{errors.bill_ref}</span>}
            </div>
          </div>

          {/* Upload PDF */}
          <div className="form-group" style={{marginBottom:16}}>
            <label className="form-label">File Bill PDF</label>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <label style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 14px',background:'var(--navy3)',border:'1px solid var(--border)',borderRadius:7,cursor: uploading?'wait':'pointer',fontSize:13,color:'var(--text2)',transition:'all 0.15s'}}>
                <input type="file" accept="application/pdf" style={{display:'none'}} onChange={e=>e.target.files[0]&&handlePdfUpload(e.target.files[0])} disabled={uploading} />
                {uploading ? <><div className="spinner" style={{width:14,height:14,borderWidth:2}}></div> Đang upload...</> : '📎 Chọn file PDF'}
              </label>
              {form.bill_pdf_url && (
                <a href={form.bill_pdf_url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:'var(--green)'}}>✓ Đã upload — Xem file</a>
              )}
            </div>
            {form.bill_pdf_url && (
              <div style={{marginTop:6}}>
                <input className="form-input" value={form.bill_pdf_url} onChange={e=>set('bill_pdf_url',e.target.value)} style={{fontSize:11}} placeholder="Hoặc paste link Drive..." />
              </div>
            )}
            {!form.bill_pdf_url && (
              <input className="form-input" value={form.bill_pdf_url} onChange={e=>set('bill_pdf_url',e.target.value)} style={{fontSize:11,marginTop:6}} placeholder="Hoặc paste link Drive trực tiếp..." />
            )}
          </div>

          <div className="divider" />

          {/* Hạng mục */}
          <div style={{marginBottom:12,fontWeight:600,fontSize:12,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Chi tiết hạng mục</div>
          <div style={{display:'grid',gridTemplateColumns:'2fr 2fr 1fr 32px',gap:8,marginBottom:6,padding:'0 12px'}}>
            <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Hạng mục *</span>
            <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Số tiền (VNĐ, chưa VAT) *</span>
            <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Ghi chú</span>
            <span></span>
          </div>
          <div className="line-items">
            {lines.map((l,i)=>(
              <div key={i} className="line-item">
                <div>
                  <select className={`form-select ${errors[`cat_${i}`]?'error':''}`} value={l.category_code} onChange={e=>setLine(i,'category_code',e.target.value)}>
                    <option value="">— Chọn —</option>
                    {categories.map(c=><option key={c.code} value={c.code}>{c.name}</option>)}
                  </select>
                  {errors[`cat_${i}`] && <span className="form-error">{errors[`cat_${i}`]}</span>}
                </div>
                <div>
                  <input className={`form-input ${errors[`amt_${i}`]?'error':''}`} value={l.amount} onChange={e=>setLine(i,'amount',formatAmt(e.target.value))} placeholder="320.000.000" style={{textAlign:'right',fontFamily:'var(--mono)'}} />
                  {errors[`amt_${i}`] && <span className="form-error">{errors[`amt_${i}`]}</span>}
                </div>
                <input className="form-input" value={l.notes} onChange={e=>setLine(i,'notes',e.target.value)} placeholder="Ghi chú..." />
                <button className="remove-line" onClick={()=>removeLine(i)} disabled={lines.length===1}>×</button>
              </div>
            ))}
          </div>
          {!isEdit && <button className="add-line-btn" onClick={addLine}>+ Thêm hạng mục</button>}

          <div className="divider" />
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:13,color:'var(--text3)'}}>
              Tổng: <span style={{fontFamily:'var(--mono)',color:'var(--amber)',fontWeight:700}}>
                {fmt(lines.reduce((s,l)=>s+(parseInt((l.amount||'').replace(/\./g,''))||0),0))} VNĐ
              </span>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" onClick={handleSubmit} disabled={saving||uploading}>
            {saving?<><div className="spinner" style={{width:14,height:14,borderWidth:2}}></div> Đang lưu...</>:isEdit?'💾 Cập nhật':'💾 Lưu vào Sheets'}
          </button>
        </div>
      </div>
    </div>
  );
}

function ActualCostList({ user, token }) {
  const { actuals, projects, suppliers, categories } = useData();
  const [showForm, setShowForm] = useState(false);
  const [editData, setEditData] = useState(null);
  const [filterPid, setFilterPid] = useState('all');
  const [filterCat, setFilterCat] = useState('all');
  const [filterMonth, setFilterMonth] = useState('');
  const [page, setPage] = useState(1);
  const PER_PAGE = 20;

  const filtered = actuals.filter(a => {
    if (filterPid !== 'all' && a.project_id !== filterPid) return false;
    if (filterCat !== 'all' && a.category_code !== filterCat) return false;
    if (filterMonth && !a.month.includes(filterMonth)) return false;
    return true;
  }).sort((a,b) => {
    const pa=parseMonth(a.month), pb=parseMonth(b.month);
    if (!pa || !pb) return 0;
    return (pb.year*12+pb.month)-(pa.year*12+pa.month);
  });

  const pages = Math.ceil(filtered.length / PER_PAGE);
  const paged = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const total = filtered.reduce((s,a)=>s+(parseFloat(a.amount)||0),0);

  const getProjectName = id => projects.find(p=>p.project_id===id)?.short_name || id;
  const getSupplierName = id => suppliers.find(s=>s.supplier_id===id)?.short_code || id;
  const getCatName = code => categories.find(c=>c.code===code)?.name || code;

  const openEdit = (a) => { setEditData(a); setShowForm(true); };
  const openAdd = () => { setEditData(null); setShowForm(true); };

  return (
    <div>
      <div className="section-header mb-20">
        <div>
          <div className="section-title">Chi Phí Thực Tế</div>
          <div className="section-sub">{actuals.length} bản ghi · Tổng: {fmtB(actuals.reduce((s,a)=>s+(parseFloat(a.amount)||0),0))}</div>
        </div>
        {(user.role === 'admin' || user.role === 'editor') && (
          <button className="btn btn-primary" onClick={openAdd}>+ Nhập Chi Phí Mới</button>
        )}
      </div>

      {/* Filters */}
      <div className="card mb-16">
        <div className="card-body" style={{padding:'14px 18px'}}>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
            <div className="form-group" style={{margin:0,minWidth:160}}>
              <select className="form-select" value={filterPid} onChange={e=>{setFilterPid(e.target.value);setPage(1);}}>
                <option value="all">Tất cả công trình</option>
                {projects.map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
              </select>
            </div>
            <div className="form-group" style={{margin:0,minWidth:140}}>
              <select className="form-select" value={filterCat} onChange={e=>{setFilterCat(e.target.value);setPage(1);}}>
                <option value="all">Tất cả hạng mục</option>
                {categories.map(c=><option key={c.code} value={c.code}>{c.name}</option>)}
              </select>
            </div>
            <div className="form-group" style={{margin:0}}>
              <input className="form-input" style={{width:110}} value={filterMonth} onChange={e=>{setFilterMonth(e.target.value);setPage(1);}} placeholder="MM/YYYY" />
            </div>
            <span style={{fontSize:12,color:'var(--text3)'}}>→ {filtered.length} kết quả · {fmtB(total)}</span>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Mã CT</th>
              <th>Công trình</th>
              <th>NCC</th>
              <th>Hạng mục</th>
              <th>Tháng</th>
              <th className="text-right">Số tiền</th>
              <th>Chứng từ</th>
              <th>PDF</th>
              <th>Ngày nhập</th>
              <th>Người nhập</th>
              <th></th>
            </tr></thead>
            <tbody>
              {paged.length === 0 && <tr><td colSpan={11} style={{textAlign:'center',padding:32,color:'var(--text3)'}}>Không có dữ liệu</td></tr>}
              {paged.map(a => (
                <tr key={a.cost_id}>
                  <td className="mono text-sm text-muted">{a.cost_id}</td>
                  <td>{getProjectName(a.project_id)}</td>
                  <td className="text-sm">{getSupplierName(a.supplier_id)}</td>
                  <td><span className="badge active">{getCatName(a.category_code)}</span></td>
                  <td className="mono text-sm">{a.month}</td>
                  <td className="mono text-right font-bold text-amber">{fmt(parseFloat(a.amount))}</td>
                  <td className="mono text-sm text-muted">{a.bill_ref}</td>
                  <td>{a.bill_pdf_url ? <a href={a.bill_pdf_url} target="_blank" rel="noopener noreferrer" style={{color:'var(--amber)',fontSize:11}}>📄 Xem</a> : <span className="text-muted text-sm">—</span>}</td>
                  <td className="text-sm text-muted">{a.input_date}</td>
                  <td className="text-sm text-muted">{a.input_by}</td>
                  <td>{(user.role==='admin'||user.role==='editor') && a.cost_id && <button className="btn btn-secondary btn-sm" onClick={()=>openEdit(a)}>✏️</button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {pages > 1 && (
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>‹ Trước</button>
            <span style={{fontSize:12,color:'var(--text3)'}}>Trang {page}/{pages}</span>
            <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={page===pages}>Sau ›</button>
          </div>
        )}
      </div>

      {showForm && <ActualCostForm user={user} token={token} onClose={()=>{setShowForm(false);setEditData(null);}} editData={editData} />}
    </div>
  );
}

function ProjectsPage({ user }) {
  const { projects, actuals, saveProject, deleteProject } = useData();
  const toast = useToast();
  const emptyForm = { project_id:'', project_name:'', short_name:'', location:'', start_date:'', end_date:'', contract_value:'', status:'Active', pm:'', notes:'' };
  const [showForm, setShowForm] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [form, setForm] = useState(emptyForm);
  const [saving, setSaving] = useState(false);
  const [deleting, setDeleting] = useState(null);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const openAdd = () => { setForm(emptyForm); setEditMode(false); setShowForm(true); };
  const openEdit = (p) => {
    setForm({ ...p, contract_value: p.contract_value ? parseInt(p.contract_value).toLocaleString('vi-VN') : '' });
    setEditMode(true); setShowForm(true);
  };

  const handleSave = async () => {
    if (!form.project_id || !form.project_name) { toast('Vui lòng điền Mã DA và Tên dự án', 'error'); return; }
    setSaving(true);
    try {
      const row = [form.project_id, form.project_name, form.short_name||form.project_id, form.location, form.start_date, form.end_date, (form.contract_value||'').replace(/\D/g,''), form.status, form.pm, form.notes];
      await saveProject(row, editMode);
      toast(editMode ? 'Đã cập nhật dự án!' : 'Đã thêm dự án!', 'success');
      setShowForm(false);
    } catch(e) { toast('Lỗi: '+e.message, 'error'); } finally { setSaving(false); }
  };

  const handleDelete = async (p) => {
    const hasActuals = actuals.some(a => a.project_id === p.project_id);
    if (hasActuals) {
      toast(`"${p.project_name}" có dữ liệu chi phí — không thể xóa. Hãy đổi sang "Đã kết thúc".`, 'error');
      return;
    }
    if (!window.confirm(`Xóa dự án "${p.project_name}"?\nHành động này không thể hoàn tác.`)) return;
    setDeleting(p.project_id);
    try {
      await deleteProject(p.project_id);
      toast('Đã xóa dự án!', 'success');
    } catch(e) { toast('Lỗi: '+e.message, 'error'); } finally { setDeleting(null); }
  };

  return (
    <div>
      <div className="section-header mb-20">
        <div><div className="section-title">Quản Lý Dự Án</div><div className="section-sub">{projects.length} dự án</div></div>
        {user.role !== 'viewer' && <button className="btn btn-primary" onClick={openAdd}>+ Thêm Dự Án</button>}
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Mã DA</th><th>Tên dự án</th><th>Địa điểm</th><th>Khởi công</th><th>Hoàn thành</th><th className="text-right">Giá trị HĐ</th><th>CHT</th><th>Trạng thái</th><th></th></tr></thead>
            <tbody>
              {sortProjects(projects).map(p => (
                <tr key={p.project_id}>
                  <td className="mono text-sm font-bold text-amber">{p.project_id}</td>
                  <td style={{fontWeight:500}}>{p.project_name}</td>
                  <td className="text-muted">{p.location}</td>
                  <td className="mono text-sm">{p.start_date}</td>
                  <td className="mono text-sm">{p.end_date}</td>
                  <td className="mono text-right">{p.contract_value ? fmtM(parseFloat(p.contract_value)) : '—'}</td>
                  <td className="text-sm">{p.pm}</td>
                  <td><span className={`badge ${projectStatusBadge(p.status)}`}>{projectStatusLabel(p.status)}</span></td>
                  <td style={{display:'flex',gap:6,whiteSpace:'nowrap'}}>
                    {user.role !== 'viewer' && <>
                      <button className="btn btn-secondary btn-sm" onClick={()=>openEdit(p)}>✏️ Sửa</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>handleDelete(p)} disabled={deleting===p.project_id}>{deleting===p.project_id?'...':'🗑️'}</button>
                    </>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {showForm && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">{editMode?'✏️ Chỉnh sửa Dự Án':'+ Thêm Dự Án Mới'}</span>
              <button className="modal-close" onClick={()=>setShowForm(false)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-grid cols2">
                <div className="form-group"><label className="form-label required">Mã DA</label><input className="form-input" value={form.project_id} onChange={e=>set('project_id',e.target.value.toUpperCase().replace(/\s/g,''))} disabled={editMode} style={editMode?{opacity:0.6}:{}} />{editMode&&<span className="form-hint">Mã DA không thể thay đổi</span>}</div>
                <div className="form-group"><label className="form-label required">Tên dự án</label><input className="form-input" value={form.project_name} onChange={e=>set('project_name',e.target.value)} /></div>
                <div className="form-group"><label className="form-label">Tên viết tắt</label><input className="form-input" value={form.short_name} onChange={e=>set('short_name',e.target.value)} /></div>
                <div className="form-group"><label className="form-label">Địa điểm</label><input className="form-input" value={form.location} onChange={e=>set('location',e.target.value)} /></div>
                <div className="form-group"><label className="form-label">Ngày khởi công</label><input className="form-input" value={form.start_date} onChange={e=>set('start_date',e.target.value)} placeholder="MM/YYYY" /></div>
                <div className="form-group"><label className="form-label">Ngày hoàn thành</label><input className="form-input" value={form.end_date} onChange={e=>set('end_date',e.target.value)} placeholder="MM/YYYY" /></div>
                <div className="form-group"><label className="form-label">Giá trị HĐ (VNĐ)</label><input className="form-input" value={form.contract_value} onChange={e=>set('contract_value',e.target.value)} /></div>
                <div className="form-group"><label className="form-label">Trạng thái</label>
                  <select className="form-select" value={form.status} onChange={e=>set('status',e.target.value)}>
                    <option value="Active">Đang hoạt động</option>
                    <option value="Closed">Đã kết thúc</option>
                    <option value="On Hold">Tạm dừng</option>
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Chỉ huy trưởng</label><input className="form-input" value={form.pm} onChange={e=>set('pm',e.target.value)} /></div>
                <div className="form-group"><label className="form-label">Ghi chú</label><input className="form-input" value={form.notes} onChange={e=>set('notes',e.target.value)} /></div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowForm(false)}>Hủy</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Đang lưu...':'💾 Lưu'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

              <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Đang lưu...':'💾 Lưu'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
